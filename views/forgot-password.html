{{> head}}
<main class="main" id="main-content">
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><img src="{{{brand.logo}}}" alt="" class="auth-logo-img"></div>
    <h2 class="auth-title">Forgot <span style="font-weight:200">password?</span></h2>
    <p class="auth-desc">Enter your email and we'll send a reset link.</p>

    <div id="authError" class="auth-error" style="display:none"></div>
    <div id="authSuccess" class="auth-success" style="display:none"></div>

    <form id="forgotForm" class="auth-form" onsubmit="return doForgot(event)">
      <div class="auth-field">
        <label class="input-label">Email</label>
        <input type="email" id="forgotEmail" class="text-input" placeholder="crabby@hermitstash.com" required>
      </div>
      <button type="submit" class="butn butn-bg butn-full radius-30" id="forgotBtn"><span>Send Reset Link</span></button>
    </form>

    <div class="auth-alt"><a href="/auth/login">Back to sign in</a></div>
  </div>
</div>

<script>
async function doForgot(e){
  e.preventDefault();
  var btn=document.getElementById('forgotBtn');
  var errEl=document.getElementById('authError');
  var successEl=document.getElementById('authSuccess');
  errEl.style.display='none';
  successEl.style.display='none';
  btn.disabled=true;btn.querySelector('span').textContent='Sending...';

  try{
    var r=await fetch('/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('forgotEmail').value})});
    var d=await r.json();
    if(d.success){
      document.getElementById('forgotForm').style.display='none';
      successEl.textContent='If an account exists with that email, a reset link has been sent.';
      successEl.style.display='block';
    }else{
      errEl.textContent=d.error||'Something went wrong.';
      errEl.style.display='block';
      btn.disabled=false;btn.querySelector('span').textContent='Send Reset Link';
    }
  }catch(err){
    errEl.textContent='Something went wrong.';
    errEl.style.display='block';
    btn.disabled=false;btn.querySelector('span').textContent='Send Reset Link';
  }
  return false;
}
</script>
</main>
{{> foot}}
