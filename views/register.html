{{> head}}
<main class="main" id="main-content">
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><img src="{{{brand.logo}}}" alt="" class="auth-logo-img"></div>
    <h2 class="auth-title">Create <span style="font-weight:200">account.</span></h2>
    <p class="auth-desc">Join the stash. First user becomes admin.</p>

    <div id="authError" class="auth-error" style="display:none"></div>

    <form id="registerForm" class="auth-form" onsubmit="return doRegister(event)">
      <div class="auth-field">
        <label class="input-label">Display name</label>
        <input type="text" id="regName" class="text-input" placeholder="Crabby HermitStash" required>
      </div>
      <div class="auth-field">
        <label class="input-label">Email</label>
        <input type="email" id="regEmail" class="text-input" placeholder="crabby@hermitstash.com" required>
      </div>
      <div class="auth-field">
        <label class="input-label">Password <span style="opacity:.5">(min 8 chars)</span></label>
        <input type="password" id="regPassword" class="text-input" placeholder="Crabby's secret" required minlength="8">
      </div>
      <button type="submit" class="butn butn-bg butn-full radius-30" id="regBtn"><span>Create Account</span></button>
    </form>

    <div class="auth-alt">Already have an account? <a href="/auth/login">Sign in</a></div>

    {% if (googleAuth) { %}
      <div class="auth-divider"><span>or</span></div>
      <a href="/auth/google" class="google-signin-btn">
        <div class="google-signin-icon">
          <svg width="18" height="18" viewBox="0 0 48 48"><path d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z" fill="#4285F4"/><path d="M2 24c0-3.6.9-7 2.4-10l-2.2-1.7C.8 15.5 0 19.6 0 24s.8 8.5 2.2 11.7L4.4 34C2.9 31 2 27.6 2 24z" fill="#FBBC05"/><path d="M24 46c5.6 0 10.6-1.8 14.5-5.2l-6.7-5.5c-2.1 1.4-4.8 2.2-7.8 2.2-6 0-11.1-4-12.9-9.5L4.4 34C7.7 40.5 15.3 46 24 46z" fill="#34A853"/><path d="M46 24c0-1.3-.2-2.7-.5-4H24v8.5h11.8c-1 3-3 5.5-5.7 7.2l6.7 5.5C41.6 37.2 46 31.2 46 24z" fill="#4285F4"/><path d="M4.4 14C7.7 7.5 15.3 2 24 2c5.6 0 10.6 2.1 14.5 5.5l-6.4 6.4C29.9 12.1 27.1 11 24 11c-6.1 0-11.1 4-12.9 9.5L4.4 14z" fill="#EA4335"/></svg>
        </div>
        <span class="google-signin-text">Sign in with Google</span>
      </a>
    {% } %}
  </div>
</div>

<script>
// Pre-fill from query params (from drop page)
(function(){
  var p=new URLSearchParams(window.location.search);
  if(p.get('email'))document.getElementById('regEmail').value=p.get('email');
  if(p.get('name'))document.getElementById('regName').value=p.get('name');
})();

async function doRegister(e){
  e.preventDefault();
  var btn=document.getElementById('regBtn');
  var errEl=document.getElementById('authError');
  errEl.style.display='none';
  btn.disabled=true;btn.querySelector('span').textContent='Creating...';

  try{
    var r=await fetch('/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({displayName:document.getElementById('regName').value,email:document.getElementById('regEmail').value,password:document.getElementById('regPassword').value})});
    var d=await r.json();
    if(d.success){window.location.href=d.redirect}
    else{errEl.textContent=d.error;errEl.style.display='block';btn.disabled=false;btn.querySelector('span').textContent='Create Account'}
  }catch(err){errEl.textContent='Something went wrong.';errEl.style.display='block';btn.disabled=false;btn.querySelector('span').textContent='Create Account'}
  return false;
}
</script>
</main>
{{> foot}}
