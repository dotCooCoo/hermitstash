{{> head}}
<main class="main">
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><img src="{{{brand.logo}}}" alt="" class="auth-logo-img"></div>
    <h2 class="auth-title">Reset <span style="font-weight:200">password.</span></h2>
    <p class="auth-desc">Choose a new password for your account.</p>

    <div id="authError" class="auth-error" style="display:none"></div>

    <form id="resetForm" class="auth-form" onsubmit="return doReset(event)">
      <div class="auth-field">
        <label class="input-label">New password <span style="opacity:.5">(min 8 chars)</span></label>
        <input type="password" id="resetPassword" class="text-input" placeholder="New password" required minlength="8">
      </div>
      <div class="auth-field">
        <label class="input-label">Confirm password</label>
        <input type="password" id="resetConfirm" class="text-input" placeholder="Confirm password" required minlength="8">
      </div>
      <button type="submit" class="butn butn-bg butn-full radius-30" id="resetBtn"><span>Reset Password</span></button>
    </form>

    <div class="auth-alt"><a href="/auth/login">Back to sign in</a></div>
  </div>
</div>

<script>
async function doReset(e){
  e.preventDefault();
  var btn=document.getElementById('resetBtn');
  var errEl=document.getElementById('authError');
  errEl.style.display='none';

  var password=document.getElementById('resetPassword').value;
  var confirm=document.getElementById('resetConfirm').value;

  if(password.length<8){
    errEl.textContent='Password must be at least 8 characters.';
    errEl.style.display='block';
    return false;
  }
  if(password!==confirm){
    errEl.textContent='Passwords do not match.';
    errEl.style.display='block';
    return false;
  }

  btn.disabled=true;btn.querySelector('span').textContent='Resetting...';

  try{
    var token='{{{token}}}';
    var r=await fetch('/auth/reset-password/'+encodeURIComponent(token),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:password,confirmPassword:confirm})});
    var d=await r.json();
    if(d.success){window.location.href=d.redirect||'/auth/login'}
    else{errEl.textContent=d.error||'Something went wrong.';errEl.style.display='block';btn.disabled=false;btn.querySelector('span').textContent='Reset Password'}
  }catch(err){errEl.textContent='Something went wrong.';errEl.style.display='block';btn.disabled=false;btn.querySelector('span').textContent='Reset Password'}
  return false;
}
</script>
</main>
{{> foot}}
