{{> head}}

<section class="admin-hero grd-border-bottom">
  <div class="admin-hero-inner">
    <span class="sub-title">Management</span>
    <h1 class="admin-title">Audit <span style="font-weight:200">Log</span></h1>
  </div>
</section>

<section class="admin-body">
  <div class="admin-inner">

    <!-- Toolbar -->
    <div class="users-toolbar" style="position:relative">
      <div style="flex:2;position:relative">
        <input type="text" id="auditSearch" class="text-input" placeholder="Search actions, details, emails, IP, path..." style="width:100%">
        <span id="auditSpinner" aria-hidden="true" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--text-body);border-radius:50%;display:none;animation:audit-spin .8s linear infinite"></span>
      </div>
      <select id="filterAction" class="text-input" onchange="loadAudit(1)">
        <option value="">All Actions</option>
        <option value="login_success">Login Success</option>
        <option value="login_failed_bad_password">Login Failed (Bad Password)</option>
        <option value="login_failed_no_account">Login Failed (No Account)</option>
        <option value="user_registered">User Registered</option>
        <option value="logout">Logout</option>
        <option value="bundle_initialized">Bundle Initialized</option>
        <option value="bundle_finalized">Bundle Finalized</option>
        <option value="upload_rejected">Upload Rejected</option>
        <option value="file_downloaded">File Downloaded</option>
        <option value="file_deleted">File Deleted</option>
        <option value="admin_settings_changed">Admin Settings Changed</option>
        <option value="user_created_by_admin">User Created by Admin</option>
        <option value="user_role_changed">User Role Changed</option>
        <option value="user_suspended">User Suspended</option>
        <option value="user_deleted">User Deleted</option>
        <option value="password_changed">Password Changed</option>
        <option value="account_self_deleted">Account Self-Deleted</option>
        <option value="server_started">Server Started</option>
        <option value="suspended_user_blocked">Suspended User Blocked</option>
        <option value="admin_access_denied">Admin Access Denied</option>
      </select>
      <input type="date" id="dateFrom" class="text-input" onchange="loadAudit(1)" style="flex:.7">
      <input type="date" id="dateTo" class="text-input" onchange="loadAudit(1)" style="flex:.7">
      <div class="audit-export">
        <span class="audit-export-label">Export</span>
        <button class="page-btn" onclick="exportAudit('csv')" title="Decrypted CSV (current filters)">CSV</button>
        <button class="page-btn" onclick="exportAudit('json')" title="Decrypted JSON (current filters)">JSON</button>
        <button class="page-btn" onclick="exportAudit('cadf')" title="CADF event batch — Cloud Auditing Data Federation for SIEM / compliance">CADF</button>
      </div>
    </div>

    <!-- Audit list -->
    <div class="admin-panel">
      <div class="admin-panel-head">
        <h2>Events</h2>
        <span class="admin-panel-count" id="auditCount">0</span>
      </div>
      <div class="admin-panel-body" id="auditList">
        <div class="admin-empty">Loading...</div>
      </div>
    </div>

    <!-- Pagination -->
    <div class="users-pagination" id="pagination"></div>

    <!-- Encrypted on-disk archives -->
    <div class="admin-panel" id="archivesPanel" style="margin-top:26px">
      <div class="admin-panel-head">
        <h2>Encrypted Archives</h2>
        <button class="page-btn" id="archiveRunBtn" onclick="runArchive()" title="Move the oldest entries (over the threshold) to an encrypted, signed bundle on disk">Archive now</button>
      </div>
      <div class="admin-panel-body" id="archivesList">
        <div class="admin-empty">Loading...</div>
      </div>
    </div>

  </div>
</section>

<style>
.audit-row{display:flex;align-items:flex-start;gap:16px;padding:14px 28px;border-bottom:1px solid var(--border-thin);transition:background .3s;flex-wrap:wrap;cursor:pointer}
.audit-row:last-child{border-bottom:none}
.audit-row:hover{background:rgba(255,255,255,.015)}
.audit-authtype{text-transform:uppercase;font-size:.64rem;letter-spacing:.04em;opacity:.75}
.audit-detail{flex-basis:100%;width:100%;margin-top:10px;padding:14px 16px;background:rgba(255,255,255,.02);border:1px solid var(--border-thin);border-radius:8px;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;cursor:auto}
.ad-group{font-size:.76rem;min-width:0}
.ad-gt{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:7px}
.ad-row{display:flex;gap:8px;margin-bottom:4px;line-height:1.45}
.ad-k{color:var(--text-muted);min-width:110px;flex:none}
.ad-v{color:var(--text-body);word-break:break-word;min-width:0}
.audit-export{display:flex;align-items:center;gap:6px;white-space:nowrap}
.audit-export-label{font-size:.78rem;color:var(--text-muted)}
.audit-time{font-size:.75rem;color:var(--text-muted);white-space:nowrap;min-width:145px;padding-top:2px}
.audit-badge{display:inline-block;font-size:.68rem;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;letter-spacing:.02em}
.audit-badge-green{background:rgba(76,175,80,.1);color:#66bb6a}
.audit-badge-red{background:rgba(255,68,68,.08);color:var(--danger)}
.audit-badge-orange{background:rgba(255,165,0,.08);color:orange}
.audit-badge-blue{background:rgba(100,181,246,.1);color:#64b5f6}
.audit-badge-grey{background:rgba(255,255,255,.04);color:var(--text-muted)}
.audit-content{flex:1;min-width:200px}
.audit-details{font-size:.82rem;color:var(--text-body);margin-top:3px}
.audit-meta{font-size:.72rem;color:var(--text-muted);margin-top:4px;display:flex;gap:16px;flex-wrap:wrap}
.audit-meta span{display:inline-flex;align-items:center;gap:4px}
@keyframes audit-spin{from{transform:translateY(-50%) rotate(0deg)}to{transform:translateY(-50%) rotate(360deg)}}
</style>

<script>
var currentPage=1,totalPages=1;

var searchTimer;
document.getElementById('auditSearch').addEventListener('input',function(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(function(){loadAudit(1)},300);
});

var ACTION_COLORS={
  login_success:'green',user_registered:'green',bundle_finalized:'green',user_created_by_admin:'green',
  login_failed_bad_password:'red',login_failed_no_account:'red',admin_access_denied:'red',
  file_deleted:'red',user_deleted:'red',account_self_deleted:'red',admin_file_deleted:'red',admin_bundle_deleted:'red',
  upload_rejected:'orange',user_suspended:'orange',suspended_user_blocked:'orange',rate_limit_hit:'orange',
  file_downloaded:'blue',bundle_viewed:'blue',bundle_file_downloaded:'blue',bundle_zip_downloaded:'blue',
  admin_dashboard_viewed:'blue',admin_settings_viewed:'blue',
  server_started:'grey',default_admin_created:'grey',vault_key_generated:'grey',
  database_migrated:'grey',settings_file_written:'grey',unexpected_error:'red',
  storage_error:'red',encryption_error:'red',config_tampered:'red'
};

function actionColor(a){return ACTION_COLORS[a]||'grey'}
function actionLabel(a){return a.replace(/_/g,' ')}

// Monotonically-increasing in-flight token. Each loadAudit() call captures
// its own token at start; only the response with the LATEST token is allowed
// to render. Prevents a slow query (sealed-column search can be slow because
// the server must vault.unseal every candidate row) from rendering over a
// faster newer one if the operator types quickly. Same idea as React Query's
// "staleness" tracking, just done by hand.
var _auditInFlight=0;

function loadAudit(page){
  currentPage=page||1;
  var q=document.getElementById('auditSearch').value;
  var action=document.getElementById('filterAction').value;
  var dateFrom=document.getElementById('dateFrom').value;
  var dateTo=document.getElementById('dateTo').value;
  var params='?page='+currentPage+'&limit=50';
  if(q)params+='&q='+encodeURIComponent(q);
  if(action)params+='&action='+encodeURIComponent(action);
  if(dateFrom)params+='&dateFrom='+dateFrom;
  if(dateTo)params+='&dateTo='+dateTo;

  var myToken=++_auditInFlight;
  var spinner=document.getElementById('auditSpinner');
  if(spinner)spinner.style.display='inline-block';

  fetch('/admin/audit/api'+params).then(function(r){return r.json()}).then(function(d){
    if(myToken!==_auditInFlight)return; // a newer query started — drop this stale response
    if(spinner)spinner.style.display='none';
    document.getElementById('auditCount').textContent=d.total;
    totalPages=d.pages;
    renderAudit(d.entries);
    renderPagination(d.page,d.pages);
  }).catch(function(){
    if(myToken!==_auditInFlight)return;
    if(spinner)spinner.style.display='none';
  });
}

// A full IP carries a '.' (IPv4) or ':' (IPv6); the privacy-preserving form is a
// bare 16-char hex hash with neither. Used to label WHERE accurately.
function ipIsFull(ip){return /[.:]/.test(ip||'')}

function renderAudit(list){
  var el=document.getElementById('auditList');
  if(!list.length){el.textContent='';var e=document.createElement('div');e.className='admin-empty';e.textContent='No audit entries found.';el.appendChild(e);return}
  var html='';
  for(var i=0;i<list.length;i++){
    var a=list[i];
    var color=actionColor(a.action);
    var ts=a.createdAt?new Date(a.createdAt).toLocaleString():'';
    html+='<div class="audit-row" onclick="toggleAuditDetail('+i+')" title="Click for full who / what / when / where / how">';
    html+='<span class="audit-time">'+esc(ts)+'</span>';
    html+='<span class="audit-badge audit-badge-'+color+'">'+esc(actionLabel(a.action||''))+'</span>';
    html+='<div class="audit-content">';
    if(a.details)html+='<div class="audit-details">'+esc(a.details)+'</div>';
    html+='<div class="audit-meta">';
    if(a.performedByEmail)html+='<span>by '+esc(a.performedByEmail)+'</span>';
    else if(a.performedBy)html+='<span>by '+esc(a.performedBy)+'</span>';
    if(a.targetEmail)html+='<span>target '+esc(a.targetEmail)+'</span>';
    if(a.ip)html+='<span>'+(ipIsFull(a.ip)?'IP':'IP-hash')+' '+esc(a.ip)+'</span>';
    if(a.method&&a.path)html+='<span>'+esc(a.method)+' '+esc(a.path)+'</span>';
    if(a.authType)html+='<span class="audit-authtype">'+esc(a.authType)+'</span>';
    html+='</div>';
    html+='<div class="audit-detail" id="auditDetail'+i+'" style="display:none" onclick="event.stopPropagation()">'+detailHtml(a)+'</div>';
    html+='</div></div>';
  }
  el.textContent='';
  el.insertAdjacentHTML('beforeend',html);
}

function _adRow(label,val){if(val==null||val==='')return '';return '<div class="ad-row"><span class="ad-k">'+esc(label)+'</span><span class="ad-v">'+esc(val)+'</span></div>'}
function _adGroup(title,body){return body?'<div class="ad-group"><div class="ad-gt">'+title+'</div>'+body+'</div>':''}

function detailHtml(a){
  var who=_adRow('Email',a.performedByEmail)+_adRow('User id',a.performedBy)+_adRow('Auth',a.authType);
  var what=_adRow('Action',actionLabel(a.action||''))+_adRow('Details',a.details)+_adRow('Target email',a.targetEmail)+_adRow('Target id',a.targetId);
  var when=_adRow('Timestamp',a.createdAt?new Date(a.createdAt).toISOString():'');
  var where=a.ip?_adRow(ipIsFull(a.ip)?'Source IP':'Source IP (hashed)',a.ip):'';
  var how=_adRow('Method',a.method)+_adRow('Path',a.path)+_adRow('User-agent',a.userAgent)+_adRow('Request id',a.requestId);
  var out=_adGroup('Who',who)+_adGroup('What',what)+_adGroup('When',when)+_adGroup('Where',where)+_adGroup('How',how);
  return out||'<div class="ad-group"><div class="ad-gt">Detail</div><div class="ad-row"><span class="ad-v">No additional context recorded for this event.</span></div></div>';
}

function toggleAuditDetail(i){
  var d=document.getElementById('auditDetail'+i);
  if(!d)return;
  d.style.display=d.style.display==='none'?'block':'none';
}

// Download the decrypted audit trail in the chosen format, honoring the current
// filters. The browser handles the Content-Disposition attachment as a download.
function exportAudit(format){
  var params='?format='+encodeURIComponent(format);
  var q=document.getElementById('auditSearch').value;
  var action=document.getElementById('filterAction').value;
  var dateFrom=document.getElementById('dateFrom').value;
  var dateTo=document.getElementById('dateTo').value;
  if(q)params+='&q='+encodeURIComponent(q);
  if(action)params+='&action='+encodeURIComponent(action);
  if(dateFrom)params+='&dateFrom='+encodeURIComponent(dateFrom);
  if(dateTo)params+='&dateTo='+encodeURIComponent(dateTo);
  window.location.href='/admin/audit/export'+params;
}

// ---- Encrypted archives ----
function fmtBytes(n){n=Number(n)||0;if(n<1024)return n+' B';if(n<1048576)return (n/1024).toFixed(1)+' KB';return (n/1048576).toFixed(1)+' MB';}
function loadArchives(){
  fetch('/admin/audit/archives').then(function(r){return r.json()}).then(function(d){
    var el=document.getElementById('archivesList');el.textContent='';
    if(!d.archives||!d.archives.length){var e=document.createElement('div');e.className='admin-empty';e.textContent=d.enabled?'No archives yet.':'Archival is off — enable it in Settings → Audit Log.';el.appendChild(e);return}
    var html='';
    for(var i=0;i<d.archives.length;i++){
      var a=d.archives[i];
      html+='<div class="audit-row" style="cursor:auto">';
      html+='<span class="audit-time">'+esc(a.createdAt?new Date(a.createdAt).toLocaleString():'')+'</span>';
      html+='<div class="audit-content"><div class="audit-details">'+esc(a.id)+'</div><div class="audit-meta">';
      html+='<span>'+(a.count||0)+' entries</span>';
      if(a.firstCounter!=null)html+='<span>counters '+esc(a.firstCounter)+'–'+esc(a.lastCounter)+'</span>';
      html+='<span>'+fmtBytes(a.sizeBytes)+'</span>';
      html+='<span id="arcMsg'+i+'"></span>';
      html+='</div></div><div class="audit-meta" style="gap:6px;align-items:center">';
      html+='<button class="page-btn" onclick="verifyArchive(\''+esc(a.id)+'\','+i+')">Verify</button>';
      html+='<button class="page-btn" onclick="exportArchive(\''+esc(a.id)+'\',\'csv\')">CSV</button>';
      html+='<button class="page-btn" onclick="exportArchive(\''+esc(a.id)+'\',\'json\')">JSON</button>';
      html+='<button class="page-btn" onclick="exportArchive(\''+esc(a.id)+'\',\'cadf\')" title="CADF compliance export">CADF</button>';
      html+='</div></div>';
    }
    el.insertAdjacentHTML('beforeend',html);
  }).catch(function(){});
}
function runArchive(){
  var btn=document.getElementById('archiveRunBtn');btn.disabled=true;btn.textContent='Archiving…';
  fetch('/admin/audit/archives/run',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d}})}).then(function(o){
    btn.disabled=false;btn.textContent='Archive now';
    var el=document.getElementById('archivesList');
    if(o.ok&&o.d&&o.d.success){
      loadArchives();loadAudit(currentPage);
      if(!o.d.archived)el.insertAdjacentHTML('afterbegin','<div class="admin-empty">Nothing to archive — under the threshold.</div>');
    }else{var m=(o.d&&(o.d.detail||o.d.error))||'Archive failed';el.insertAdjacentHTML('afterbegin','<div class="admin-empty" style="color:var(--danger)">'+esc(m)+'</div>');}
  }).catch(function(){btn.disabled=false;btn.textContent='Archive now';});
}
function verifyArchive(id,i){
  var s=document.getElementById('arcMsg'+i);if(s)s.textContent='verifying…';
  fetch('/admin/audit/archives/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})}).then(function(r){return r.json()}).then(function(d){
    if(!s)return;
    if(d.ok){s.textContent='✓ verified '+d.rowsVerified+' rows';s.style.color='#66bb6a';}
    else{s.textContent='✗ '+(d.reason||'verification failed');s.style.color='var(--danger)';}
  }).catch(function(){if(s){s.textContent='✗ verify error';s.style.color='var(--danger)';}});
}
function exportArchive(id,format){
  window.location.href='/admin/audit/archives/export?id='+encodeURIComponent(id)+'&format='+encodeURIComponent(format);
}

function renderPagination(page,pages){
  var el=document.getElementById('pagination');
  if(pages<=1){el.textContent='';return}
  var html='';
  var start=Math.max(1,page-4),end=Math.min(pages,page+4);
  if(start>1)html+='<button class="page-btn" onclick="loadAudit(1)">1</button><span style="color:var(--text-muted)">...</span>';
  for(var i=start;i<=end;i++){
    html+='<button class="page-btn'+(i===page?' active':'')+'" onclick="loadAudit('+i+')">'+i+'</button>';
  }
  if(end<pages)html+='<span style="color:var(--text-muted)">...</span><button class="page-btn" onclick="loadAudit('+pages+')">'+pages+'</button>';
  el.textContent='';
  el.insertAdjacentHTML('beforeend',html);
}

function esc(s){return window.Helpers?Helpers.esc(s):String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;')}

window.addEventListener('load',function(){loadAudit(1);loadArchives();});
</script>
{{> foot}}
