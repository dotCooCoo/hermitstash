{{> head}}

<section class="admin-hero grd-border-bottom">
  <div class="admin-hero-inner" style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <span class="sub-title">Management</span>
      <h1 class="admin-title">Customer <span style="font-weight:200">Stash</span></h1>
    </div>
    <button class="butn butn-bg butn-sm radius-30" onclick="openStashModal()"><span>+ New Stash Page</span></button>
  </div>
</section>

<section class="admin-body">
  <div class="admin-inner">

    <div class="admin-panel">
      <div class="admin-panel-head">
        <h2>Stash Pages</h2>
        <span class="admin-panel-count" id="stashCount">0</span>
      </div>
      <div class="admin-panel-body" id="stashList">
        <div class="admin-empty">Loading...</div>
      </div>
    </div>

    <div id="stashEmpty" style="display:none;text-align:center;padding:40px 20px;color:var(--muted);font-size:.85rem;border:1px dashed var(--border-thin);border-radius:12px;margin-top:20px">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--main-color)" stroke-width="1.5" style="margin-bottom:12px;opacity:.4"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg><br>
      No stash pages yet.<br><span style="font-size:.78rem;opacity:.6">Click "+ New Stash Page" to create a branded upload link.</span>
    </div>

  </div>
</section>

<!-- Stash Create/Edit Modal -->
<div class="modal-overlay" id="stashEditModal" style="display:none" onclick="if(event.target===this)closeStashEdit()">
  <div class="modal-card" style="max-width:560px;max-height:85vh;display:flex;flex-direction:column">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h3 class="modal-title" style="margin:0" id="seModalTitle">New <span style="font-weight:200">Stash Page</span></h3>
      <button onclick="closeStashEdit()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.4rem;padding:4px 8px;line-height:1">&times;</button>
    </div>
    <div id="stashEditMsg" class="settings-msg" style="display:none"></div>
    <div style="overflow-y:auto;flex:1">
      <input type="hidden" id="seId">
      <div style="display:grid;gap:12px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div><label class="input-label">Name</label><input type="text" class="text-input" id="seName"></div>
          <div><label class="input-label">URL Slug</label><div style="display:flex;align-items:center;gap:0"><span class="stash-slug-prefix">/stash/</span><input type="text" class="text-input" id="seSlug" style="font-family:monospace;border-radius:0 8px 8px 0"></div></div>
        </div>
        <div><label class="input-label">Page Title</label><input type="text" class="text-input" id="seTitle"></div>
        <div><label class="input-label">Instructions</label><textarea class="text-input" id="seSubtitle" rows="2" style="resize:vertical"></textarea></div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
          <div><label class="input-label">Accent Color</label><div style="display:flex;align-items:center;gap:8px"><input type="color" id="seColor" style="width:42px;height:36px;padding:2px;border:1px solid var(--border-thin);border-radius:8px;background:none;cursor:pointer"><input type="text" class="text-input" id="seColorText" style="font-family:monospace;flex:1"></div></div>
          <div>
            <label class="input-label">Logo</label>
            <div id="seLogoPreview" style="display:none;margin-bottom:6px">
              <div style="display:flex;align-items:center;gap:8px">
                <img id="seLogoPreviewImg" src="" alt="" style="height:32px;max-width:100px;object-fit:contain;border-radius:6px;background:rgba(255,255,255,.04);padding:2px 6px">
                <button type="button" class="user-action-btn user-action-delete" onclick="clearLogo()" style="padding:3px 8px;font-size:.7rem"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><span>Remove</span></button>
              </div>
            </div>
            <div id="seLogoUploadArea">
              <input type="file" id="seLogoFile" accept="image/png,image/jpeg,image/svg+xml,image/webp,image/gif" style="display:none" onchange="previewLogo(this)">
              <button type="button" class="butn butn-bord-thin butn-sm radius-30" onclick="document.getElementById('seLogoFile').click()" style="font-size:.75rem"><span>Upload</span></button>
            </div>
            <input type="hidden" id="seLogoUrl" value="">
          </div>
          <div><label class="input-label">Password <span style="color:var(--muted);font-weight:400">(blank = remove)</span></label><input type="password" class="text-input" id="sePassword" placeholder="********"></div>
          <div style="grid-column:1/-1"><label class="input-label">Restrict to emails/domains <span style="color:var(--muted);font-weight:400">(blank = open, use @domain.com for entire domains)</span></label><input type="text" class="text-input" id="seAllowedEmails" placeholder="alice@example.com, @acme.com"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
          <div><label class="input-label">Max File Size</label><div class="size-input-group"><input type="number" class="text-input" id="seMaxFileSize" min="0" step="1"><select class="text-input size-unit" id="seMaxFileSizeUnit"><option value="1048576">MB</option><option value="1073741824">GB</option></select></div></div>
          <div><label class="input-label">Max Files</label><input type="number" class="text-input" id="seMaxFiles" min="0"></div>
          <div><label class="input-label">Default Expiry</label><select class="text-input" id="seExpiry"><option value="0">Use global</option><option value="1">1 day</option><option value="7">7 days</option><option value="30">30 days</option><option value="90">90 days</option><option value="-1">Never</option></select></div>
        </div>
        <div><label class="input-label">Allowed Extensions <span style="color:var(--muted);font-weight:400">(blank = use global)</span></label><input type="text" class="text-input" id="seAllowedExtensions"></div>
        <div style="display:flex;align-items:center;gap:12px;margin-top:8px">
          <label class="toggle" style="flex-shrink:0"><input type="checkbox" id="seSyncEnabled"><span class="toggle-slider"></span></label>
          <label class="input-label" style="margin:0">Enable Sync <span style="color:var(--muted);font-weight:400">(persistent mutable bundle for desktop sync client)</span></label>
        </div>
        <div id="seSyncTokenArea" style="display:none;margin-top:8px">
          <button type="button" class="butn butn-bord-thin butn-sm radius-30" onclick="generateSyncToken()"><span>Generate Sync Token</span></button>
          <div id="seSyncTokenResult" style="display:none;margin-top:8px;padding:12px;background:rgba(139,92,246,.06);border-radius:8px;font-family:monospace;font-size:.8rem;word-break:break-all"></div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border-thin)">
      <button class="butn butn-bord-thin butn-sm radius-30" onclick="closeStashEdit()"><span>Cancel</span></button>
      <button class="butn butn-bg butn-sm radius-30" id="seSubmitBtn" onclick="saveStashEdit()"><span>Create Stash Page</span></button>
    </div>
  </div>
</div>

<script>
function esc(s){return window.Helpers?Helpers.esc(s):String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;')}
function showRenameError(input,msg){if(window.Helpers)return Helpers.showRenameError(input,msg);var err=input.parentNode.querySelector('.rename-error');if(!err){err=document.createElement('div');err.className='rename-error';err.style.cssText='font-size:.72rem;color:var(--danger);margin-top:2px';input.parentNode.appendChild(err)}err.textContent=msg;input.style.borderColor='var(--danger)';setTimeout(function(){if(err.parentNode)err.remove();input.style.borderColor=''},3000)}
function formatSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(0)+' KB';if(b<1073741824)return(b/1048576).toFixed(1)+' MB';return(b/1073741824).toFixed(2)+' GB'}

function loadStash(){
  fetch('/admin/stash/api').then(function(r){return r.json()}).then(function(d){
    var el=document.getElementById('stashList');
    var empty=document.getElementById('stashEmpty');
    var count=document.getElementById('stashCount');
    if(!d.pages||!d.pages.length){el.textContent='';var e=document.createElement('div');e.className='admin-empty';e.textContent='No stash pages.';el.appendChild(e);empty.style.display='block';count.textContent='0';return}
    empty.style.display='none';count.textContent=d.pages.length;
    var html='';
    for(var i=0;i<d.pages.length;i++){
      var p=d.pages[i];var sc=p.enabled?'badge-admin':'badge-suspended';var st=p.enabled?'active':'disabled';
      var sf=p.accentColor&&/^#[0-9a-fA-F]{3,8}$/.test(p.accentColor)?p.accentColor:'';
      html+='<div class="admin-user-row" style="'+(sf?'border-left:3px solid '+sf:'')+'">';
      html+='<div class="admin-user-info" style="flex:1"><div class="admin-user-avatar" style="'+(sf?'background:'+sf+'20;border-color:'+sf+'40':'')+'"><span class="admin-user-initial" style="'+(sf?'color:'+sf:'')+'">'+esc((p.name||p.slug).charAt(0).toUpperCase())+'</span></div>';
      html+='<div><div class="admin-user-name">'+esc(p.name||p.slug)+'</div><div class="admin-user-email"><a href="/stash/'+esc(p.slug)+'" target="_blank" style="color:var(--main-color);font-family:monospace;font-size:.8rem">/stash/'+esc(p.slug)+'</a>';
      if(p.hasPassword)html+=' <span style="color:var(--muted);font-size:.7rem" title="Password protected">&#128274;</span>';
      if(p.allowedEmails)html+=' <span style="color:var(--muted);font-size:.7rem" title="Email restricted: '+esc(p.allowedEmails)+'">&#9993;</span>';
      if(p.syncEnabled)html+=' <span style="color:var(--main-color);font-size:.7rem" title="Sync enabled">&#8635;</span>';
      html+='</div></div></div><div class="admin-user-meta"><span class="badge '+sc+'">'+st+'</span><span class="admin-user-date">'+(p.bundleCount||0)+' uploads</span>';
      if(p.totalBytes>0)html+='<span class="admin-user-date">'+formatSize(p.totalBytes)+'</span>';
      html+='</div><div class="admin-user-actions">';
      html+='<button class="user-action-btn" title="View bundles" onclick="toggleBundles(\''+p._id+'\',this)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span>Bundles</span></button>';
      html+='<button class="user-action-btn user-action-role" title="Copy link" onclick="cpStash(\''+esc(p.slug)+'\',this)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>Copy</span></button>';
      html+='<button class="user-action-btn user-action-role" title="Edit" onclick=\'editStash('+JSON.stringify(p).replace(/\x27/g,"&#39;")+')\' ><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><span>Edit</span></button>';
      html+='<button class="user-action-btn" title="Open" onclick="window.open(\'/stash/'+esc(p.slug)+'\',\'_blank\')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg><span>Open</span></button>';
      html+='<button class="user-action-btn '+(p.enabled?'user-action-suspend':'user-action-activate')+'" onclick="toggleStash(\''+p._id+'\')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+(p.enabled?'<circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>':'<polyline points="20 6 9 17 4 12"/>')+'</svg><span>'+(p.enabled?'Disable':'Enable')+'</span></button>';
      html+='<button class="user-action-btn user-action-delete" onclick="deleteStash(\''+p._id+'\',\''+esc(p.name||p.slug)+'\')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg><span>Delete</span></button>';
      html+='</div></div>';
      html+='<div id="bundles-'+p._id+'" style="display:none"></div>';
    }
    el.textContent='';el.insertAdjacentHTML('beforeend',html);
  }).catch(function(){document.getElementById('stashList').textContent='';var e=document.createElement('div');e.style.cssText='text-align:center;padding:16px;color:var(--danger);font-size:.85rem';e.textContent='Failed to load stash pages.';document.getElementById('stashList').appendChild(e)});
}

var _stashEditId=null;
function openStashModal(p){
  _stashEditId=p?p._id:null;
  document.getElementById('seModalTitle').textContent='';
  var t=document.createElement('span');t.textContent=_stashEditId?'Edit ':'New ';
  var s=document.createElement('span');s.style.fontWeight='200';s.textContent='Stash Page';
  document.getElementById('seModalTitle').appendChild(t);document.getElementById('seModalTitle').appendChild(s);
  document.getElementById('seSubmitBtn').querySelector('span').textContent=_stashEditId?'Save Changes':'Create Stash Page';
  document.getElementById('seId').value=_stashEditId||'';
  document.getElementById('seName').value=p?p.name||'':'';
  document.getElementById('seSlug').value=p?p.slug||'':'';
  document.getElementById('seTitle').value=p?p.title||'':'';
  document.getElementById('seSubtitle').value=p?p.subtitle||'':'';
  document.getElementById('seColor').value=(p&&p.accentColor)||'#8B5CF6';
  document.getElementById('seColorText').value=(p&&p.accentColor)||'#8B5CF6';
  document.getElementById('sePassword').value=(p&&p.hasPassword)?'********':'';
  document.getElementById('seAllowedEmails').value=(p&&p.allowedEmails)||'';
  document.getElementById('seSyncEnabled').checked=!!(p&&p.syncEnabled);
  document.getElementById('seSyncTokenArea').style.display=(p&&p.syncEnabled)?'block':'none';
  document.getElementById('seSyncTokenResult').style.display='none';
  document.getElementById('seSyncEnabled').onchange=function(){document.getElementById('seSyncTokenArea').style.display=this.checked?'block':'none'};
  var mfs=(p&&p.maxFileSize)||0;
  if(mfs>=1073741824){document.getElementById('seMaxFileSize').value=Math.round(mfs/1073741824);document.getElementById('seMaxFileSizeUnit').value='1073741824'}
  else{document.getElementById('seMaxFileSize').value=Math.round(mfs/1048576);document.getElementById('seMaxFileSizeUnit').value='1048576'}
  document.getElementById('seMaxFiles').value=(p&&p.maxFiles)||0;
  document.getElementById('seExpiry').value=String((p&&p.defaultExpiry)||0);
  document.getElementById('seAllowedExtensions').value=(p&&p.allowedExtensions)||'';
  document.getElementById('seLogoUrl').value=(p&&p.logoUrl)||'';
  if(p&&p.logoUrl){document.getElementById('seLogoPreviewImg').src=p.logoUrl;document.getElementById('seLogoPreview').style.display='block';document.getElementById('seLogoUploadArea').style.display='none'}
  else{document.getElementById('seLogoPreview').style.display='none';document.getElementById('seLogoUploadArea').style.display='block'}
  document.getElementById('seLogoFile').value='';delete document.getElementById('seLogoFile')._pendingFile;
  document.getElementById('stashEditMsg').style.display='none';
  document.getElementById('stashEditModal').style.display='flex';
  if(!_stashEditId){document.getElementById('seName').focus()}
}
function editStash(p){openStashModal(p)}
function closeStashEdit(){document.getElementById('stashEditModal').style.display='none';_stashEditId=null}
function saveStashEdit(){
  var isEdit=!!_stashEditId;
  var name=document.getElementById('seName').value.trim();
  var slug=document.getElementById('seSlug').value.trim().toLowerCase();
  if(!name){var m=document.getElementById('stashEditMsg');m.className='settings-msg settings-msg-err';m.textContent='Name required';m.style.display='block';return}
  if(!slug&&!isEdit)slug=name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,50);
  var mfsVal=parseFloat(document.getElementById('seMaxFileSize').value)||0;
  var mfsUnit=parseInt(document.getElementById('seMaxFileSizeUnit').value)||1048576;
  var body={name:name,slug:slug,title:document.getElementById('seTitle').value.trim(),subtitle:document.getElementById('seSubtitle').value.trim(),accentColor:document.getElementById('seColorText').value.trim()||document.getElementById('seColor').value,password:document.getElementById('sePassword').value,allowedEmails:document.getElementById('seAllowedEmails').value.trim(),syncEnabled:document.getElementById('seSyncEnabled').checked,maxFileSize:Math.round(mfsVal*mfsUnit),maxFiles:parseInt(document.getElementById('seMaxFiles').value)||0,defaultExpiry:parseInt(document.getElementById('seExpiry').value)||0,allowedExtensions:document.getElementById('seAllowedExtensions').value.trim()};
  var btn=document.getElementById('seSubmitBtn');var msg=document.getElementById('stashEditMsg');
  btn.disabled=true;btn.querySelector('span').textContent=isEdit?'Saving...':'Creating...';
  fetch(isEdit?'/admin/stash/'+_stashEditId+'/update':'/admin/stash/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json()}).then(function(d){
    btn.disabled=false;btn.querySelector('span').textContent=isEdit?'Save Changes':'Create Stash Page';
    if(d.success){
      var stashId=isEdit?_stashEditId:(d.stash&&d.stash._id);
      var pending=document.getElementById('seLogoFile')._pendingFile;
      if(pending&&stashId){
        uploadLogo(stashId,function(){msg.className='settings-msg settings-msg-ok';msg.textContent=isEdit?'Saved':'Created';msg.style.display='block';setTimeout(function(){closeStashEdit();loadStash()},600)});
      }else{msg.className='settings-msg settings-msg-ok';msg.textContent=isEdit?'Saved':'Created';msg.style.display='block';setTimeout(function(){closeStashEdit();loadStash()},600)}
    }else{msg.className='settings-msg settings-msg-err';msg.textContent=d.error||'Failed';msg.style.display='block'}
  }).catch(function(){btn.disabled=false;btn.querySelector('span').textContent=isEdit?'Save Changes':'Create Stash Page';msg.className='settings-msg settings-msg-err';msg.textContent='Network error';msg.style.display='block'});
}
function previewLogo(input){
  var file=input.files[0];if(!file)return;
  if(file.size>2*1024*1024){alert('Logo must be under 2MB');input.value='';return}
  var reader=new FileReader();
  reader.onload=function(e){document.getElementById('seLogoPreviewImg').src=e.target.result;document.getElementById('seLogoPreview').style.display='block';document.getElementById('seLogoUploadArea').style.display='none';input._pendingFile=file};
  reader.readAsDataURL(file);
}
function clearLogo(){
  document.getElementById('seLogoPreview').style.display='none';document.getElementById('seLogoUploadArea').style.display='block';
  document.getElementById('seLogoUrl').value='';document.getElementById('seLogoFile').value='';delete document.getElementById('seLogoFile')._pendingFile;
  if(_stashEditId){fetch('/admin/stash/'+_stashEditId+'/update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({logoUrl:''})})}
}
function uploadLogo(stashId,cb){
  var file=document.getElementById('seLogoFile')._pendingFile;if(!file){cb();return}
  var fm=new FormData();fm.append('file',file);
  fetch('/admin/stash/'+stashId+'/logo',{method:'POST',body:fm}).then(function(r){return r.json()}).then(function(d){
    delete document.getElementById('seLogoFile')._pendingFile;cb();
  }).catch(function(){cb()});
}
function toggleBundles(stashId,btn){
  var el=document.getElementById('bundles-'+stashId);
  if(el.style.display!=='none'){el.style.display='none';btn.querySelector('span').textContent='Bundles';return}
  btn.querySelector('span').textContent='Loading...';
  fetch('/admin/stash/'+stashId+'/bundles').then(function(r){return r.json()}).then(function(d){
    btn.querySelector('span').textContent='Bundles';
    if(!d.bundles||!d.bundles.length){
      el.textContent='';var empty=document.createElement('div');empty.style.cssText='padding:12px 28px 12px 52px;font-size:.82rem;color:var(--muted);border-bottom:1px solid var(--border-thin)';empty.textContent='No bundles uploaded yet.';el.appendChild(empty);
      el.style.display='block';return;
    }
    var html='';
    for(var i=0;i<d.bundles.length;i++){
      var b=d.bundles[i];
      html+='<div class="admin-user-row" style="padding-left:52px;background:rgba(255,255,255,.01)">';
      html+='<div class="admin-user-info" style="flex:1"><div>';
      html+='<div class="admin-user-name" style="font-size:.82rem;cursor:pointer" title="Click to rename" onclick="renameStashBundleName(\''+esc(b.shareId)+'\',this)">'+esc(b.bundleName||b.uploaderName||'Anonymous');
      if(b.message) html+=' <span style="color:var(--muted);font-size:.75rem">— '+esc(b.message.slice(0,60))+(b.message.length>60?'...':'')+'</span>';
      html+='</div>';
      html+='<div class="admin-user-email" style="font-size:.75rem"><a href="/b/'+esc(b.shareId)+'" target="_blank" style="color:var(--main-color)">/b/'+esc(b.shareId).slice(0,12)+'...</a></div>';
      html+='</div></div>';
      html+='<div class="admin-user-meta">';
      html+='<span class="admin-user-date">'+b.fileCount+' files</span>';
      html+='<span class="admin-user-date">'+formatSize(b.totalSize||0)+'</span>';
      html+='<span class="admin-user-date">'+new Date(b.createdAt).toLocaleDateString()+'</span>';
      html+='</div>';
      html+='<div class="admin-user-actions">';
      html+='<button class="user-action-btn" title="View files" onclick="toggleFiles(\''+stashId+'\',\''+b._id+'\',this)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>Files</span></button>';
      html+='<button class="user-action-btn user-action-role" title="Copy link" onclick="cpBundle(\''+esc(b.shareId)+'\',this)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>Copy</span></button>';

function toggleFiles(stashId,bundleId,btn){

    btn.querySelector('span').textContent='Files';

      if(f.relativePath&&f.relativePath!==f.originalName) html+='<div style="font-size:.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(f.relativePath)+'</div>';
      html+='</div></div>';
      html+='<div class="admin-user-meta">';
      html+='<span class="admin-user-date" style="font-size:.75rem">'+formatSize(f.size)+'</span>';
      html+='<span class="admin-user-date" style="font-size:.75rem">'+esc(f.mimeType||'')+'</span>';
      if(f.downloads>0) html+='<span class="admin-user-date" style="font-size:.75rem">'+f.downloads+' DL</span>';
      html+='</div>';
      html+='<div class="admin-user-actions">';
      html+='<button class="user-action-btn" title="Download" onclick="window.open(\'/s/'+esc(f.shareId)+'/download\',\'_blank\')" style="padding:4px 10px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span>DL</span></button>';
      html+='</div></div>';
    }
    el.textContent='';el.insertAdjacentHTML('beforeend',html);el.style.display='block';
  }).catch(function(){btn.querySelector('span').textContent='Files'});
}
function downloadCertBundle(){
  if(!window._pendingCert)return;
  var c=window._pendingCert;
  // Create a simple text bundle (no ZIP needed — 3 PEM files as a combined text download)
  var content='# HermitStash Sync Client Certificate Bundle\n# Generated: '+new Date().toISOString()+'\n\n';
  content+='# === client.crt (give to sync client) ===\n'+c.cert+'\n';
  content+='# === client.key (PRIVATE — keep secure) ===\n'+c.key+'\n';
  content+='# === ca.crt (CA certificate for verification) ===\n'+c.ca+'\n';
  var blob=new Blob([content],{type:'text/plain'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hermitstash-sync-certs.pem';a.click();
  URL.revokeObjectURL(a.href);
}
function generateSyncToken(){
  if(!_stashEditId)return;
  var btn=event.target;btn.disabled=true;
  fetch('/admin/stash/'+_stashEditId+'/sync-token',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(function(r){return r.json()}).then(function(d){
    btn.disabled=false;
    if(d.success){
      var el=document.getElementById('seSyncTokenResult');
      var html='<strong>Enrollment Code (shown once, expires in 1 hour):</strong>';
      html+='<div style="margin:12px 0;padding:16px;background:rgba(139,92,246,.08);border:2px solid rgba(139,92,246,.2);border-radius:10px;text-align:center">';
      html+='<span style="font-size:1.4rem;font-weight:800;font-family:monospace;letter-spacing:3px;color:var(--main-color)">'+esc(d.enrollmentCode)+'</span></div>';
      html+='<button type="button" onclick="navigator.clipboard.writeText(\''+esc(d.enrollmentCode)+'\');this.textContent=\'Copied!\'" style="cursor:pointer;background:var(--main-color);color:#fff;border:none;padding:6px 16px;border-radius:6px;font-size:.8rem">Copy Code</button>';
      html+='<p style="font-size:.75rem;color:var(--muted);margin-top:10px;line-height:1.5">Give this code to the sync client user. They enter it during <code>hermitstash-sync init</code> — the client exchanges it for the API key and certificates automatically. One-time use.</p>';
      el.innerHTML=html;
      el.style.display='block';
    } else { alert(d.error||'Failed to create token') }
  }).catch(function(){btn.disabled=false;alert('Failed')});
}
function renameStashBundleName(shareId,el){
  var current=el.textContent;
  var input=document.createElement('input');input.type='text';input.value=current;
  input.className='text-input';input.style.cssText='font-size:.82rem;padding:2px 8px;width:100%;max-width:300px';input.placeholder='Bundle name';
  input.onblur=function(){
    var name=input.value.trim();
    fetch('/bundles/'+shareId+'/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name})}).then(function(r){return r.json()}).then(function(d){
      if(d.success){el.textContent=d.name||name||'Unnamed';el.style.display='';input.remove()}
      else{showRenameError(input,d.error||'Rename failed')}
    }).catch(function(){el.style.display='';input.remove()});
  };
  input.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();input.blur()}if(e.key==='Escape'){el.style.display='';input.remove()}};
  el.style.display='none';el.parentNode.insertBefore(input,el);input.focus();input.select();
}
function renameStashFile(shareId,el){
  var current=el.textContent;
  var input=document.createElement('input');input.type='text';input.value=current;
  input.className='text-input';input.style.cssText='font-size:.8rem;padding:2px 8px;width:100%;max-width:300px';
  input.onblur=function(){
    var name=input.value.trim();
    fetch('/files/'+shareId+'/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name})}).then(function(r){return r.json()}).then(function(d){
      if(d.success){el.textContent=d.name||name;el.title='Click to rename';el.style.display='';input.remove()}
      else{showRenameError(input,d.error||'Rename failed')}
    }).catch(function(){el.style.display='';input.remove()});
  };
  input.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();input.blur()}if(e.key==='Escape'){el.style.display='';input.remove()}};
  el.style.display='none';el.parentNode.insertBefore(input,el);input.focus();input.select();
}
function deleteStashBundle(stashId,bundleId,btn){
  if(!confirm('Delete this bundle and all its files?'))return;
  btn.querySelector('span').textContent='Deleting...';btn.disabled=true;
  fetch('/admin/stash/'+stashId+'/bundles/'+bundleId+'/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(function(r){return r.json()}).then(function(d){
    if(d.success){btn.closest('.admin-user-row').remove();loadStash()}
    else{alert(d.error||'Failed');btn.querySelector('span').textContent='Delete';btn.disabled=false}
  }).catch(function(){btn.querySelector('span').textContent='Delete';btn.disabled=false});
}
function cpBundle(shareId,btn){
  navigator.clipboard.writeText(location.origin+'/b/'+shareId).then(function(){var s=btn.querySelector('span');s.textContent='Copied!';setTimeout(function(){s.textContent='Copy'},2000)});
}
function toggleStash(id){fetch('/admin/stash/'+id+'/toggle',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(function(r){return r.json()}).then(function(d){if(d.success)loadStash();else alert(d.error)})}
function deleteStash(id,name){if(!confirm('Delete stash page "'+name+'"?'))return;fetch('/admin/stash/'+id+'/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(function(r){return r.json()}).then(function(d){if(d.success)loadStash();else alert(d.error)})}
function cpStash(slug,btn){navigator.clipboard.writeText(location.origin+'/stash/'+slug).then(function(){var s=btn.querySelector('span');s.textContent='Copied!';setTimeout(function(){s.textContent='Copy'},2000)})}
document.getElementById('seColor').addEventListener('input',function(){document.getElementById('seColorText').value=this.value});
document.getElementById('seColorText').addEventListener('input',function(){if(/^#[0-9a-fA-F]{6}$/.test(this.value))document.getElementById('seColor').value=this.value});
document.getElementById('seName').addEventListener('input',function(){if(!_stashEditId){document.getElementById('seSlug').value=this.value.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,50)}});
window.addEventListener('load',function(){loadStash()});
</script>
