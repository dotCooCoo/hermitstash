# HermitStash — Docker Compose for Coolify
#
# Use this file when deploying via Coolify's Docker Compose build pack.
# Differences from docker-compose.image.yml:
#   - No ports: — Coolify's Traefik proxy handles routing via your assigned domain
#   - Extended volume syntax with is_directory: true — Coolify creates host dirs
#
# Coolify performs its own service healthchecks; the explicit healthcheck below
# is mirrored from the Dockerfile so the same readiness signal is visible in
# both `docker inspect` and the Coolify UI.
#
# After deploying, assign a domain in the Coolify UI and configure RP_ORIGIN
# to match (e.g. https://files.example.com).

services:
  hermitstash:
    image: ghcr.io/dotcoocoo/hermitstash:1   # see README "Image tag scheme" for :1 / :1.7 / :1.7.x / :latest options
    init: true
    expose:
      - "3000"
    volumes:
      - type: bind
        source: ./data
        target: /app/data
        is_directory: true
      - type: bind
        source: ./uploads
        target: /app/uploads
        is_directory: true
    shm_size: 256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',function(r){process.exit(r.statusCode===200?0:1)}).on('error',function(){process.exit(1)})"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    environment:
      # Container user — default 99:100 (Unraid). Set to 1000:1000 for standard Linux.
      PUID: "99"
      PGID: "100"
      UMASK: "022"               # 755 dirs, 644 files. Use 000 for Unraid nobody:users sharing.
      TZ: "Etc/UTC"              # e.g. America/New_York

      NODE_ENV: production
      HERMITSTASH_TMPDIR: /dev/shm
      PORT: 3000
      TRUST_PROXY: "true"

      # Set to your Coolify-assigned domain (required for passkeys + HSTS)
      RP_ORIGIN: ""              # e.g. https://files.example.com

      # Auth (defaults work for getting started)
      LOCAL_AUTH: "true"
      REGISTRATION_OPEN: "true"
      PUBLIC_UPLOAD: "true"
      PASSKEY_ENABLED: "true"

      # All other settings (email, S3, branding, etc.) are configured
      # via the admin panel at /admin after first start.

      # ── Vault passphrase protection (opt-in, v1.9+) ────────────────────
      # See README "Passphrase protection (opt-in)". In Coolify, store the
      # passphrase as an Environment Secret (not a plain Environment Variable)
      # so it's masked in the UI and stored encrypted. Then reference it as
      # VAULT_PASSPHRASE below, and set VAULT_PASSPHRASE_MODE=required.
      # LOSS of passphrase = LOSS of all encrypted data.
      #
      # VAULT_PASSPHRASE_MODE: "required"
      # VAULT_PASSPHRASE: ""     # set via Coolify Environment Secrets

      # ── PEM at-rest sealing for CA + TLS keys (v1.9.4+, opt-in) ─────
      # CA_KEY_SEALED: "required"
      # TLS_KEY_SEALED: "required"
      # ENFORCE_MTLS_STRICT: "true"     # v1.9.5
    restart: unless-stopped
