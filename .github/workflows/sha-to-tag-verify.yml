# Tag-push integrity gate. Runs on every `v*` tag push and verifies
# the tag's commit SHA is on main's first-parent history AND the tag
# object itself is annotated + SSH-signed against the maintainer key.
#
# Defends against the tag-mutation class (CVE-2025-30066:
# `tj-actions/changed-files` retroactive tag rewrite, 23,000+ affected
# repos, March 2025) and the source-side-malicious-publish class
# (TanStack 2025-05-11: 84 `@tanstack/*` versions published with valid
# SLSA L3 provenance because the source side was compromised).
#
# The PR-merge requirement common to PR-flow projects does NOT apply
# here: the public repo is sync-mirrored from the private repo
# (scripts/sync-to-public.sh), and both repos accept direct
# maintainer pushes to main (no PR squash-merge flow). The
# signed-tag + first-parent invariants remain meaningful gates.
#
# Operators verifying release integrity locally run the same chain
# via the recipe in README.md → "Verifying release authenticity".

name: sha-to-tag verify

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to verify (e.g. v1.11.7)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: sha-to-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify tag SHA on main + SSH-signed tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history needed for first-parent walk)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Ensure origin/main is up to date
        # actions/checkout@v6 on a tag-push event checks out the tag
        # commit and may leave `origin/main` either unset or pointing at
        # whatever state the runner cached before the tag-push fetch.
        # `git rev-list --first-parent origin/main` then walks a stale
        # ref and the next step's grep returns no match. Force-fetch
        # origin/main into the remote-tracking ref so the walk hits the
        # actual current branch head.
        run: git fetch --no-tags origin main:refs/remotes/origin/main

      - name: Resolve tag + verify chain
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "::group::Tag under verification"
          echo "tag: $TAG"
          echo "::endgroup::"

          # 1. Resolve the commit the tag points at.
          SHA=$(git rev-list -n 1 "$TAG")
          echo "::group::Tag commit SHA"
          echo "sha: $SHA"
          echo "::endgroup::"

          # 2. Confirm the SHA is on main's FIRST-PARENT history.
          #    `git merge-base --is-ancestor` only proves reachability
          #    via ANY parent chain — a commit on a merged PR branch
          #    that isn't on main's first-parent path would still pass
          #    that test. The strict first-parent invariant is what
          #    the project's squash-merge policy actually produces;
          #    check it directly.
          if ! git rev-list --first-parent origin/main | grep -qx "$SHA"; then
            echo "::error::tag $TAG points at $SHA which is NOT on main's first-parent history"
            echo "::error::this means the tag was created from a side-branch commit that never merged via the project's squash-merge flow"
            echo "::error::the publish workflow refuses to proceed; investigate before re-tagging"
            exit 1
          fi
          echo "::notice::on first-parent main: OK"

          # PR-merge check intentionally omitted — see the file's
          # header comment. HS uses direct-to-main pushes on both
          # repos; a PR-merge requirement would always fail here
          # without adding integrity value.

          # 3. Confirm the tag itself is annotated AND SSH-signed.
          #    `git cat-file -t` only distinguishes lightweight vs
          #    annotated; `git tag -v` is the one that walks the
          #    SSH-signature chain against the maintainer's
          #    allowed_signers entry. The repo's `release-tags`
          #    ruleset has `required_signatures` enabled, so the
          #    server-side gate already refuses unsigned tags on push
          #    — this check is the belt-and-suspenders workflow-side
          #    gate that runs the same chain locally.
          OBJECT_TYPE=$(git cat-file -t "$TAG")
          if [ "$OBJECT_TYPE" != "tag" ]; then
            echo "::error::tag $TAG is a lightweight tag ($OBJECT_TYPE), not annotated"
            echo "::error::release tags must be annotated + SSH-signed"
            exit 1
          fi
          # Capture the maintainer's allowed_signers entry inline
          # (matches the README "Verifying release authenticity"
          # recipe). The pubkey is operator-published; the workflow
          # re-derives the allowed_signers line for self-contained
          # verify.
          curl -fsSL https://github.com/dotCooCoo.keys                                                       \
            | grep "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPiE/PETpyiVPd8aMygJ+S9CsSVolp4HQZaAuiYVwbBa"      \
            | awk '{print "RobertLeeLW@gmail.com namespaces=\"git\" "$1" "$2}'                             \
            > /tmp/hermitstash-allowed-signers
          if ! git -c gpg.ssh.allowedSignersFile=/tmp/hermitstash-allowed-signers tag -v "$TAG"; then
            echo "::error::tag $TAG failed SSH-signature verification against the maintainer's pinned key"
            echo "::error::README.md publishes the expected pubkey under 'Verifying release authenticity'"
            exit 1
          fi
          echo "::notice::annotated + SSH-signed tag: OK"

          # 4. Emit the verified chain to the step summary for
          #    operator visibility (release-page footer cross-
          #    reference).
          {
            echo "### sha-to-tag verification"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Tag | \`${TAG}\` |"
            echo "| Tag commit SHA | \`${SHA}\` |"
            echo "| Tag object type | annotated + SSH-signed |"
            echo "| Verdict | PASS — tag SHA is on main's first-parent + signature verified against maintainer key |"
          } >> "$GITHUB_STEP_SUMMARY"
