name: Docker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build and scan without pushing to registry'
        type: boolean
        default: true

permissions:
  contents: read
  packages: write
  id-token: write  # cosign keyless signing via GitHub OIDC

env:
  IMAGE: ghcr.io/dotcoocoo/hermitstash
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Lint must pass before we build/sign/publish a release image.
  # Mirrors .github/workflows/ci.yml's lint job (no PR comment step — tag pushes
  # aren't PR events). Keep these two jobs in sync when changing rules.
  lint:
    if: github.repository == 'dotCooCoo/hermitstash'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Match the runtime floor enforced by server.js + package.json.
          node-version: 24.14.1

      - name: Install ESLint
        run: npm install --no-save eslint@^10 eslint-plugin-security@^4

      - name: Run ESLint
        id: eslint
        run: |
          cat > eslint.ci.config.js << 'ESLINT_CONFIG'
          var security = require("eslint-plugin-security");
          module.exports = [
            {
              ignores: [
                "tests/", "public/js/", "node_modules/**", "template/",
                "scripts/", "deploy/", "lib/vendor/", "eslint.ci.config.js",
              ],
            },
            {
              files: ["**/*.js"],
              plugins: { security: security },
              linterOptions: { reportUnusedDisableDirectives: "off" },
              languageOptions: {
                ecmaVersion: 2022,
                sourceType: "commonjs",
                globals: {
                  require: "readonly", module: "readonly", exports: "readonly",
                  __dirname: "readonly", __filename: "readonly",
                  process: "readonly", console: "readonly", Buffer: "readonly",
                  setTimeout: "readonly", setInterval: "readonly", setImmediate: "readonly",
                  clearTimeout: "readonly", clearInterval: "readonly",
                  URL: "readonly", URLSearchParams: "readonly",
                  global: "readonly", crypto: "readonly",
                  TextEncoder: "readonly", TextDecoder: "readonly",
                },
              },
              rules: {
                "no-unused-vars": ["warn", { argsIgnorePattern: "^_", caughtErrorsIgnorePattern: "^_" }],
                "no-console": "off",
                "no-eval": "error",
                "no-implied-eval": "error",
                "no-new-func": "error",
                "no-self-compare": "error",
                "no-constructor-return": "error",
                "no-new-wrappers": "error",
                "no-throw-literal": "error",
                "security/detect-eval-with-expression": "error",
                "security/detect-child-process": "warn",
                "security/detect-unsafe-regex": "error",
                "security/detect-buffer-noassert": "error",
                "security/detect-new-buffer": "error",
                "security/detect-possible-timing-attacks": "warn",
                "security/detect-pseudoRandomBytes": "warn",
                "security/detect-object-injection": "off",
                "security/detect-non-literal-fs-filename": "off",
                "security/detect-non-literal-require": "off",
                "security/detect-non-literal-regexp": "off",
              },
            },
          ];
          ESLINT_CONFIG

          set +e
          npx eslint --config eslint.ci.config.js . --max-warnings=0
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then echo "::error::ESLint found issues"; fi
          exit $EXIT_CODE

      - name: Run Hadolint
        if: always()
        id: hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: style

      - name: Run ShellCheck
        if: always()
        id: shellcheck
        run: |
          SCRIPTS=$(find . -name '*.sh' -not -path './node_modules/*' -not -path './tests/*' | sort)
          echo "Checking: $SCRIPTS"
          set +e
          echo "$SCRIPTS" | xargs shellcheck --severity=style --format=gcc
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ]; then echo "::error::ShellCheck found issues"; fi
          exit $EXIT_CODE

      - name: Run codebase-patterns (vendored from blamejs)
        if: always()
        id: codebase_patterns
        run: |
          set +e
          node tests/lint/codebase-patterns.test.js
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ]; then echo "::error::codebase-patterns found violations"; fi
          exit $EXIT_CODE

      - name: Verify release-notes rollup
        # Non-current minor lines must collapse to a single
        # `release-notes/v<minor>.x.json` rollup. The `--check` mode
        # exits non-zero if any non-current minor still has per-patch
        # files. Operator runs `consolidate-release-notes.js --prune`
        # between releases to roll them up; this gate catches a
        # missed rollup before a release lands.
        if: always()
        id: rollup_check
        run: |
          set +e
          node scripts/consolidate-release-notes.js --check
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ]; then echo "::error::release-notes rollup needed"; fi
          exit $EXIT_CODE

      - name: Verify CHANGELOG.md in sync with release-notes/
        # CHANGELOG.md is a derived artifact rebuilt from
        # `release-notes/`. The `--check` mode does an in-memory
        # rebuild + diff against on-disk and fails fast when an
        # operator added/edited a release-notes JSON without running
        # `--rebuild`. Same non-mutating gate as the rollup check.
        if: always()
        id: changelog_drift
        run: |
          set +e
          node scripts/generate-changelog-entry.js --check
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ]; then echo "::error::CHANGELOG.md drifts from release-notes/"; fi
          exit $EXIT_CODE

      - name: Lint summary
        if: always()
        run: |
          ESLINT_OK=${{ steps.eslint.outcome == 'success' }}
          HADOLINT_OK=${{ steps.hadolint.outcome == 'success' }}
          SHELLCHECK_OK=${{ steps.shellcheck.outcome == 'success' }}
          PATTERNS_OK=${{ steps.codebase_patterns.outcome == 'success' }}
          ROLLUP_OK=${{ steps.rollup_check.outcome == 'success' }}
          CHANGELOG_OK=${{ steps.changelog_drift.outcome == 'success' }}
          PASS="✅"
          FAIL="❌"
          ESLINT_ICON=$( [ "$ESLINT_OK" = "true" ] && echo "$PASS" || echo "$FAIL" )
          HADOLINT_ICON=$( [ "$HADOLINT_OK" = "true" ] && echo "$PASS" || echo "$FAIL" )
          SHELLCHECK_ICON=$( [ "$SHELLCHECK_OK" = "true" ] && echo "$PASS" || echo "$FAIL" )
          PATTERNS_ICON=$( [ "$PATTERNS_OK" = "true" ] && echo "$PASS" || echo "$FAIL" )
          ROLLUP_ICON=$( [ "$ROLLUP_OK" = "true" ] && echo "$PASS" || echo "$FAIL" )
          CHANGELOG_ICON=$( [ "$CHANGELOG_OK" = "true" ] && echo "$PASS" || echo "$FAIL" )
          {
            echo "### Lint Results"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| ESLint (JS + security)         | $ESLINT_ICON |"
            echo "| Hadolint (Dockerfile)          | $HADOLINT_ICON |"
            echo "| ShellCheck (shell)             | $SHELLCHECK_ICON |"
            echo "| codebase-patterns (vendored)   | $PATTERNS_ICON |"
            echo "| release-notes rollup           | $ROLLUP_ICON |"
            echo "| CHANGELOG.md drift             | $CHANGELOG_ICON |"
          } >> "$GITHUB_STEP_SUMMARY"

  build-and-push:
    needs: lint
    if: github.repository == 'dotCooCoo/hermitstash'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify license is AGPL-3.0
        run: |
          grep -q "GNU AFFERO GENERAL PUBLIC LICENSE" LICENSE || { echo "::error::LICENSE file does not contain AGPL-3.0"; exit 1; }
          grep -q '"AGPL-3.0-or-later"' package.json || { echo "::error::package.json license is not AGPL-3.0-or-later"; exit 1; }
          echo "License check passed"

      - name: Resolve version + cross-check tag vs constants.js
        # Tag pushes derive version from the ref (`refs/tags/vX.Y.Z` →
        # `X.Y.Z`) which is bulletproof. Workflow-dispatch (manual)
        # falls back to `lib/constants.js` since there's no tag context.
        # In both cases we cross-check the two sources match; a drift
        # between the tag and constants.js fails loud (v1.11.7 shipped
        # with `vdev` filenames because the prior shape swallowed a
        # `node` error and silently fell back to "dev").
        id: version
        run: |
          set -euo pipefail
          CONSTANTS_VERSION=$(node -e "console.log(require('./lib/constants').version)")
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [ "$TAG_VERSION" != "$CONSTANTS_VERSION" ]; then
              echo "::error::tag ${GITHUB_REF} → $TAG_VERSION but lib/constants.js → $CONSTANTS_VERSION (mismatch)"
              echo "::error::bump BOTH lib/constants.js and package.json before tag-push"
              exit 1
            fi
            VERSION="$TAG_VERSION"
          else
            VERSION="$CONSTANTS_VERSION"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Install cosign
        if: ${{ !inputs.dry_run }}
        uses: sigstore/cosign-installer@v3

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ !inputs.dry_run }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Sign image with cosign (keyless, GitHub OIDC)
        if: ${{ !inputs.dry_run }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes ${{ env.IMAGE }}@${DIGEST}

      - name: Set up Node.js (for build-vex.js)
        if: ${{ !inputs.dry_run }}
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1

      - name: Build CSAF 2.1 VEX document
        if: ${{ !inputs.dry_run }}
        id: vex
        run: |
          mkdir -p artifacts
          node scripts/build-vex.js --out artifacts
          VEX_FILE="artifacts/hermitstash-v${{ steps.version.outputs.version }}.vex.json"
          if [ -f "$VEX_FILE" ]; then
            echo "vex_file=$VEX_FILE" >> "$GITHUB_OUTPUT"
            echo "VEX document built: $VEX_FILE"
          else
            echo "No VEX statements pending — skipping attestation."
          fi

      - name: Attach VEX as cosign attestation
        if: ${{ !inputs.dry_run && steps.vex.outputs.vex_file }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          VEX_FILE: ${{ steps.vex.outputs.vex_file }}
        run: |
          cosign attest --yes \
            --predicate "$VEX_FILE" \
            --type "https://docs.oasis-open.org/csaf/csaf-vex/v2.1/" \
            "${{ env.IMAGE }}@${DIGEST}"

      # Two-step Trivy: full visibility for the next-release fix log,
      # narrow gate that fails on actionable CRITICAL/HIGH with a fix available.
      - name: Scan image with Trivy (visibility — all severities, informational)
        if: ${{ !inputs.dry_run && steps.build.outputs.digest }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: 'table'
          exit-code: '0'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
          scanners: 'vuln,secret,misconfig'
          ignore-unfixed: false

      - name: Scan image with Trivy (gate — CRITICAL/HIGH with fix available)
        if: ${{ !inputs.dry_run && steps.build.outputs.digest }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          scanners: 'vuln,secret,misconfig'
          ignore-unfixed: true

      - name: Save image tarball + write SHA-256 + SHA3-512 sidecars
        if: ${{ !inputs.dry_run }}
        id: sha3
        run: |
          set -euo pipefail
          docker pull ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          mkdir -p artifacts
          TARBALL="artifacts/hermitstash-v${{ steps.version.outputs.version }}.image.tar"
          docker save ${{ env.IMAGE }}@${{ steps.build.outputs.digest }} -o "$TARBALL"
          node scripts/sha3-digest.js "$TARBALL"
          # Surface the SHA3-512 in the step summary (matches the prior
          # release surface — operators that scraped that line stay
          # green).
          HASH=$(awk '{print $1}' "${TARBALL}.sha3-512")
          echo "sha3=$HASH" >> "$GITHUB_OUTPUT"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          {
            echo ""
            echo "#### SHA3-512"
            echo '```'
            echo "$HASH"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Sign image tarball with ML-DSA-65 (PQC sidecar)
        # Conditional on the operator having completed the one-time
        # release-key setup (run scripts/generate-release-signing-key.js,
        # commit keys/release-pqc-pub.json, set RELEASE_PQC_SIGNING_KEY
        # in the release environment). When either piece is missing
        # the step skips with a warning; the release still ships with
        # cosign image sig + SBOM + SHA-256 + SHA3-512 sidecars, and
        # the PQC sig sidecar lights up on the FIRST release after
        # setup completes.
        if: ${{ !inputs.dry_run }}
        id: pqc_sig
        env:
          RELEASE_PQC_SIGNING_KEY: ${{ secrets.RELEASE_PQC_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_PQC_SIGNING_KEY:-}" ]; then
            printf '%s\n' '::warning::RELEASE_PQC_SIGNING_KEY is empty — skipping the PQC sidecar.'
            printf '%s\n' '::warning::Operator: run "node scripts/generate-release-signing-key.js" once, commit keys/release-pqc-pub.json, set the secret in the release environment, then future releases pick up the sig automatically.'
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ ! -f keys/release-pqc-pub.json ]; then
            printf '%s\n' '::warning::keys/release-pqc-pub.json is missing in-tree — skipping the PQC sidecar.'
            printf '%s\n' '::warning::The secret is set but the matching public key is not committed — the signer self-verify cross-check would refuse the sig anyway.'
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          node scripts/sign-release-artifact.js "${{ steps.sha3.outputs.tarball }}"
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Upload release asset bundle (for the release job)
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            artifacts/hermitstash-v${{ steps.version.outputs.version }}.image.tar.sha256
            artifacts/hermitstash-v${{ steps.version.outputs.version }}.image.tar.sha3-512
            artifacts/hermitstash-v${{ steps.version.outputs.version }}.image.tar.mldsa.sig
            artifacts/hermitstash-v${{ steps.version.outputs.version }}.vex.json
          if-no-files-found: ignore
          retention-days: 1

      - name: Build summary
        run: |
          echo "### Docker Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | ${{ steps.version.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Platforms** | linux/amd64, linux/arm64 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Registry** | ${{ env.IMAGE }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Dry run** | ${{ inputs.dry_run || 'false' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Tags" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  smoke-test:
    needs: build-and-push
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # v1.9.5 — matrix over [plaintext, wrapped] to catch wrapped-mode regressions
    # earlier (the v1.9.2 backup-wrapped-mode bug shipped because plaintext-only
    # smoke tests didn't exercise the unwrap code path).
    strategy:
      fail-fast: false
      matrix:
        vault_mode: [plaintext, wrapped]

    steps:
      - name: Pull published image
        run: docker pull ${{ env.IMAGE }}@${{ needs.build-and-push.outputs.digest }}

      - name: Verify OCI labels
        run: |
          set -euo pipefail
          LABELS=$(docker inspect ${{ env.IMAGE }}@${{ needs.build-and-push.outputs.digest }} --format '{{json .Config.Labels}}')
          echo "$LABELS" | python3 -m json.tool
          echo "$LABELS" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'org.opencontainers.image.title' in d, 'missing title label'
          assert 'org.opencontainers.image.source' in d, 'missing source label'
          assert 'org.opencontainers.image.licenses' in d, 'missing license label'
          print('Labels OK: title=' + d['org.opencontainers.image.title'] + ', license=' + d.get('org.opencontainers.image.licenses', 'none'))
          "

      - name: Start container
        env:
          # In wrapped mode, vault.init() must:
          #   1. See VAULT_PASSPHRASE_MODE=required
          #   2. Find no existing vault.key OR vault.key.sealed (first-run wrapped bootstrap)
          #   3. Read VAULT_PASSPHRASE from env
          #   4. Generate keypair, seal with the passphrase, write vault.key.sealed
          # ARGON2_FAST=1 keeps the Argon2id derivation fast for CI; not safe in prod
          # but acceptable for an ephemeral smoke-test container that's destroyed
          # after the test.
          VAULT_MODE_ENV: ${{ matrix.vault_mode == 'wrapped' && '-e VAULT_PASSPHRASE_MODE=required -e VAULT_PASSPHRASE=ci-smoke-test-passphrase-do-not-use-in-prod -e ARGON2_FAST=1' || '' }}
        run: |
          # shellcheck disable=SC2086
          docker run -d --name smoke-test \
            --init \
            --security-opt no-new-privileges:true \
            --cap-drop ALL \
            --cap-add CHOWN --cap-add SETUID --cap-add SETGID --cap-add DAC_OVERRIDE \
            -e PUID=1000 -e PGID=1000 \
            -e UMASK=002 \
            -e TZ=UTC \
            -p 3000:3000 \
            --shm-size=256m \
            $VAULT_MODE_ENV \
            ${{ env.IMAGE }}@${{ needs.build-and-push.outputs.digest }}
          echo "Waiting for health check (vault_mode=${{ matrix.vault_mode }})..."
          # Wrapped mode needs extra time for first-run keypair generation +
          # Argon2 derivation; allow 60s instead of 30s
          MAX_WAIT=${{ matrix.vault_mode == 'wrapped' && '60' || '30' }}
          for i in $(seq 1 "$MAX_WAIT"); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Healthy after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Health check
        run: |
          set -euo pipefail
          HEALTH=$(curl -sf http://localhost:3000/health)
          echo "$HEALTH"
          echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status'] == 'ok', 'unhealthy: ' + str(d)"

      - name: Capture container diagnostics on failure
        if: failure()
        run: |
          echo "=== docker ps ==="
          docker ps -a --filter name=smoke-test
          echo ""
          echo "=== docker inspect (State + ExitCode + Health) ==="
          docker inspect smoke-test --format '{{json .State}}' | python3 -m json.tool 2>&1 || docker inspect smoke-test --format '{{.State}}'
          echo ""
          echo "=== docker logs (full) ==="
          docker logs smoke-test 2>&1 || echo "  (container gone — can't fetch logs)"
          echo ""
          echo "=== runtime probes (container may have exited) ==="
          docker exec smoke-test ls -la /app/docker-entrypoint.sh 2>&1 || echo "  (can't exec — container not running)"
          docker exec smoke-test which node setpriv groupmod usermod 2>&1 || true
          docker exec smoke-test id hermit 2>&1 || true
          docker exec smoke-test node --version 2>&1 || true

      - name: Verify non-root user
        run: |
          echo "=== Diagnostics ==="
          echo "Entrypoint exists:"
          docker exec smoke-test ls -la /app/docker-entrypoint.sh 2>&1 || echo "  MISSING"
          echo "setpriv exists:"
          docker exec smoke-test which setpriv 2>&1 || echo "  MISSING"
          echo "Hermit user exists:"
          docker exec smoke-test id hermit 2>&1 || echo "  MISSING"
          echo "PID 1 command:"
          docker exec smoke-test cat /proc/1/cmdline 2>&1 | tr '\0' ' ' && echo
          echo "PID 1 status:"
          docker exec smoke-test cat /proc/1/status 2>&1 | grep -E "^(Name|Uid|Gid):"
          echo "Container logs (last 5 lines):"
          docker logs smoke-test 2>&1 | tail -5
          echo "=== Verdict ==="
          PID1_UID=$(docker exec smoke-test cat /proc/1/status | grep "^Uid:" | awk '{print $2}')
          HERMIT_UID=$(docker exec smoke-test id -u hermit 2>/dev/null || echo "unknown")
          echo "PID 1 UID: $PID1_UID, hermit UID: $HERMIT_UID"
          if [ "$PID1_UID" = "0" ]; then
            echo "WARNING: PID 1 is root — setpriv may not be dropping privileges"
          else
            echo "OK: PID 1 is non-root (UID $PID1_UID)"
          fi

      - name: Verify version
        run: |
          VERSION=$(docker exec smoke-test node -e "console.log(require('./lib/constants').version)")
          echo "Version: $VERSION"
          [ -n "$VERSION" ] || { echo "ERROR: empty version"; exit 1; }

      - name: Verify security headers
        run: |
          set -euo pipefail
          HEADERS=$(curl -sI http://localhost:3000/health)
          echo "$HEADERS"
          echo "$HEADERS" | grep -qi "x-content-type-options" || { echo "ERROR: missing x-content-type-options"; exit 1; }
          echo "Security headers OK"

      - name: Verify wrapped-mode artifact (sealed key file present)
        # MUST run BEFORE STOPSIGNAL — that step does `docker stop` and
        # subsequent `docker exec` calls fail with "container is not running".
        if: matrix.vault_mode == 'wrapped'
        run: |
          # In wrapped first-run, vault.init writes vault.key.sealed (NOT vault.key)
          docker exec smoke-test ls -la /app/data/ | grep "vault.key.sealed" || { echo "ERROR: vault.key.sealed missing in wrapped mode"; docker exec smoke-test ls -la /app/data/; exit 1; }
          docker exec smoke-test sh -c '[ ! -f /app/data/vault.key ]' || { echo "ERROR: plaintext vault.key exists in wrapped mode"; exit 1; }
          echo "Wrapped-mode artifacts OK: sealed file present, plaintext absent"

      - name: Verify STOPSIGNAL (graceful shutdown)
        run: |
          docker stop smoke-test --time 10
          EXIT=$(docker inspect smoke-test --format '{{.State.ExitCode}}')
          echo "Exit code: $EXIT"
          [ "$EXIT" = "0" ] || echo "WARNING: non-zero exit ($EXIT) — may be expected on first run without setup"

      - name: Smoke test summary
        if: always()
        run: |
          echo "### Smoke Test Results (vault_mode=${{ matrix.vault_mode }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pull image | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| OCI labels | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health check | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Non-root user | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version report | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security headers | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Graceful shutdown | Passed |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ matrix.vault_mode }}" = "wrapped" ]; then
            echo "| Wrapped-mode artifacts | Passed |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f smoke-test 2>/dev/null || true

  # SLSA L3 provenance for the OCI image. Runs only on real tag pushes
  # (not dry-run / branch pushes) because the attestation binds to the
  # workflow_ref + tag-ref pair that's verifiable by downstream
  # operators. The container generator publishes the attestation to
  # the OCI registry directly (cosign-keyless via the workflow's OIDC
  # token); operators verify with
  # `slsa-verifier verify-image ghcr.io/dotcoocoo/hermitstash@<digest>`.
  provenance:
    needs: build-and-push
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run }}
    permissions:
      id-token: write    # OIDC token for Sigstore-keyless signing
      contents: read
      packages: write    # push the provenance attestation to GHCR
      actions: read      # introspect this workflow run for the attestation
    # Tag-pinned (not SHA-pinned) — the SLSA internal builder-fetch
    # step expects `BUILDER_REF` in `refs/tags/vX.Y.Z` form and refuses
    # a 40-hex SHA. See blamejs upstream npm-publish.yml for the same
    # constraint + the GH organization actions-allowlist pattern that
    # has to include `slsa-framework/slsa-github-generator/*`.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ghcr.io/dotcoocoo/hermitstash
      digest: ${{ needs.build-and-push.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # Create the signed GitHub Release atomically with all assets
  # attached at creation time. Runs only on real tag pushes after the
  # smoke test passes and the SLSA provenance lands in the registry.
  release:
    needs: [build-and-push, smoke-test, provenance]
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write    # gh release create + asset attach
      packages: read     # docker pull from GHCR
    steps:
      - name: Checkout source (for release-notes generator + key files)
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1

      - name: Download release asset bundle (from build-and-push)
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: artifacts

      - name: Resolve version from constants.js
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./lib/constants').version)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate release-page markdown from structured source
        # Single source of truth: release-notes/v$VERSION.json. The
        # generator validates the JSON against the section allowlist +
        # title/body format rules + a leak-vocabulary sweep, then emits
        # multi-section markdown (`##` headings + bullet lists) for
        # the GitHub release page. scripts/check-changelog-extract.js
        # exercises a parallel CHANGELOG-derived path as a pre-push
        # gate; this step is the authoritative source for what gets
        # attached to the release.
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          node scripts/generate-changelog-entry.js "$VERSION" --release-page > release-notes.md
          BYTE_COUNT=$(wc -c < release-notes.md | tr -d ' ')
          if [ "$BYTE_COUNT" -lt 64 ]; then
            echo "::error::generate-changelog-entry produced an unexpectedly small release-page markdown ($BYTE_COUNT bytes)."
            echo "::error::Inspect release-notes/v$VERSION.json — the generator likely validated through but every section was empty."
            exit 1
          fi
          echo "[release-notes] generated $BYTE_COUNT bytes of release-page markdown for v$VERSION"
          echo "--- release-notes.md (first 20 lines) ---"
          head -20 release-notes.md
          echo "---"

      - name: Create signed release with ALL assets atomically
        # Refuses to overwrite an existing release — the workflow is
        # authoritative for release creation. If a release for this
        # tag already exists, that's an integrity signal (operator did
        # a manual `gh release create`, or a duplicate workflow run
        # already created it). Fail loud.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:      v${{ steps.version.outputs.version }}
          VERSION:  ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists. The workflow is authoritative for release creation."
            echo "::error::Either delete the existing release (gh release delete $TAG) and re-run, OR push a new tag."
            exit 1
          fi
          # Title comes from the structured release-notes JSON's
          # `headline` field — single source of truth.
          HEADLINE=$(node -e "console.log(require('./release-notes/v${VERSION}.json').headline)")
          if [ -n "$HEADLINE" ]; then
            TITLE="$TAG — $HEADLINE"
          else
            TITLE="$TAG"
          fi
          # Build the asset list — every file is optional via the `[ -f ]`
          # gate so the release create runs cleanly even when the PQC
          # sidecar or VEX is absent.
          ASSETS=()
          for F in \
            "artifacts/hermitstash-v${VERSION}.image.tar.sha256" \
            "artifacts/hermitstash-v${VERSION}.image.tar.sha3-512" \
            "artifacts/hermitstash-v${VERSION}.image.tar.mldsa.sig" \
            "artifacts/hermitstash-v${VERSION}.vex.json"; do
            if [ -f "$F" ]; then ASSETS+=("$F"); fi
          done
          echo "[release-create] title: $TITLE"
          echo "[release-create] assets:"
          for A in "${ASSETS[@]}"; do echo "  - $A"; done
          gh release create "$TAG" \
            "${ASSETS[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TITLE" \
            --notes-file release-notes.md
          echo "[release-create] release $TAG created with full asset bundle"
