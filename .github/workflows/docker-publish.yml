name: Docker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build and scan without pushing to registry'
        type: boolean
        default: true

permissions:
  contents: read
  packages: write
  id-token: write  # cosign keyless signing via GitHub OIDC

env:
  IMAGE: ghcr.io/dotcoocoo/hermitstash

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify license is AGPL-3.0
        run: |
          grep -q "GNU AFFERO GENERAL PUBLIC LICENSE" LICENSE || { echo "::error::LICENSE file does not contain AGPL-3.0"; exit 1; }
          grep -q '"AGPL-3.0-or-later"' package.json || { echo "::error::package.json license is not AGPL-3.0-or-later"; exit 1; }
          echo "License check passed"

      - name: Get version from constants.js
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./lib/constants').version)" 2>/dev/null || echo "dev")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Install cosign
        if: ${{ !inputs.dry_run }}
        uses: sigstore/cosign-installer@v3

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ !inputs.dry_run }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Sign image with cosign (keyless, GitHub OIDC)
        if: ${{ !inputs.dry_run }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes ${{ env.IMAGE }}@${DIGEST}

      - name: Scan image with Trivy
        if: ${{ !inputs.dry_run && steps.build.outputs.digest }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Generate SHA3-512 digest
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          docker pull ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          DIGEST=$(docker save ${{ env.IMAGE }}@${{ steps.build.outputs.digest }} | openssl dgst -sha3-512 | awk '{print $NF}')
          echo "SHA3-512: $DIGEST"
          echo "sha3=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### SHA3-512" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$DIGEST" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Verify: \`docker save ${{ env.IMAGE }}:sha-${{ github.sha }} | openssl dgst -sha3-512\`" >> "$GITHUB_STEP_SUMMARY"
        id: sha3

      - name: Build summary
        run: |
          echo "### Docker Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | ${{ steps.version.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Platforms** | linux/amd64, linux/arm64 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Registry** | ${{ env.IMAGE }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Dry run** | ${{ inputs.dry_run || 'false' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Tags" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  smoke-test:
    needs: build-and-push
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Pull published image
        run: docker pull ${{ env.IMAGE }}@${{ needs.build-and-push.outputs.digest }}

      - name: Verify OCI labels
        run: |
          set -euo pipefail
          LABELS=$(docker inspect ${{ env.IMAGE }}@${{ needs.build-and-push.outputs.digest }} --format '{{json .Config.Labels}}')
          echo "$LABELS" | python3 -m json.tool
          echo "$LABELS" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'org.opencontainers.image.title' in d, 'missing title label'; assert d['org.opencontainers.image.title'] == 'HermitStash', 'wrong title'; print('Labels OK')"

      - name: Start container
        run: |
          docker run -d --name smoke-test \
            -p 3000:3000 \
            --shm-size=256m \
            ${{ env.IMAGE }}@${{ needs.build-and-push.outputs.digest }}
          echo "Waiting for health check..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Healthy after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Health check
        run: |
          set -euo pipefail
          HEALTH=$(curl -sf http://localhost:3000/health)
          echo "$HEALTH"
          echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status'] == 'ok', 'unhealthy: ' + str(d)"

      - name: Verify non-root user
        run: |
          USER=$(docker exec smoke-test whoami)
          echo "Running as: $USER"
          [ "$USER" = "hermit" ] || { echo "ERROR: running as $USER, expected hermit"; exit 1; }

      - name: Verify version
        run: |
          VERSION=$(docker exec smoke-test node -e "console.log(require('./lib/constants').version)")
          echo "Version: $VERSION"
          [ -n "$VERSION" ] || { echo "ERROR: empty version"; exit 1; }

      - name: Verify security headers
        run: |
          set -euo pipefail
          HEADERS=$(curl -sI http://localhost:3000/health)
          echo "$HEADERS"
          echo "$HEADERS" | grep -qi "x-content-type-options" || { echo "ERROR: missing x-content-type-options"; exit 1; }
          echo "Security headers OK"

      - name: Verify STOPSIGNAL (graceful shutdown)
        run: |
          docker stop smoke-test --time 10
          EXIT=$(docker inspect smoke-test --format '{{.State.ExitCode}}')
          echo "Exit code: $EXIT"
          [ "$EXIT" = "0" ] || echo "WARNING: non-zero exit ($EXIT) — may be expected on first run without setup"

      - name: Smoke test summary
        if: always()
        run: |
          echo "### Smoke Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pull image | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| OCI labels | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health check | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Non-root user | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version report | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security headers | Passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Graceful shutdown | Passed |" >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        run: docker rm -f smoke-test 2>/dev/null || true

