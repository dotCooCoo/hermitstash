name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Match the runtime floor enforced by server.js + package.json.
          # 24.14.1 pins the latest active 24.x patch series — covers OpenSSL
          # 3.5 PQC bindings + cumulative security patches.
          node-version: 24.14.1

      - name: Install ESLint
        run: npm install --no-save eslint@^10 eslint-plugin-security@^4

      # ── ESLint ─────────────────────────────────────────────────
      # Uses the canonical eslint.config.js committed at the repo root.
      # Same config runs locally via `npx eslint .` — no drift.
      - name: Run ESLint
        id: eslint
        run: |
          set +e
          OUTPUT=$(npx eslint . --max-warnings=0 2>&1)
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<ESLINT_EOF"
            echo "$OUTPUT"
            echo "ESLINT_EOF"
          } >> "$GITHUB_OUTPUT"

          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::ESLint found issues"
          fi
          exit $EXIT_CODE

      # ── Hadolint (Dockerfile) ──────────────────────────────────
      - name: Run Hadolint
        if: always()
        id: hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: style

      - name: Capture Hadolint result
        if: always()
        id: hadolint_result
        run: |
          if [ -z "$HADOLINT_RESULTS" ]; then
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "output=" >> "$GITHUB_OUTPUT"
          else
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            {
              echo "output<<HADOLINT_EOF"
              printf '%s\n' "$HADOLINT_RESULTS"
              echo "HADOLINT_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      # ── ShellCheck ─────────────────────────────────────────────
      - name: Run ShellCheck
        if: always()
        id: shellcheck
        run: |
          SCRIPTS=$(find . -name '*.sh' -not -path './node_modules/*' -not -path './tests/*' | sort)
          echo "Checking: $SCRIPTS"

          set +e
          OUTPUT=$(echo "$SCRIPTS" | xargs shellcheck --severity=style --format=gcc 2>&1)
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<SHELLCHECK_EOF"
            echo "$OUTPUT"
            echo "SHELLCHECK_EOF"
          } >> "$GITHUB_OUTPUT"

          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::ShellCheck found issues"
          fi
          exit $EXIT_CODE

      # ── codebase-patterns (vendored from blamejs) ──────────────
      - name: Run codebase-patterns
        if: always()
        id: codebase_patterns
        run: |
          set +e
          OUTPUT=$(node tests/lint/codebase-patterns.test.js 2>&1)
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<PATTERNS_EOF"
            echo "$OUTPUT"
            echo "PATTERNS_EOF"
          } >> "$GITHUB_OUTPUT"

          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::codebase-patterns found violations"
          fi
          exit $EXIT_CODE

      # ── Currency visibility (non-blocking) ─────────────────────
      # Surfaces stale GitHub Action pins / vendored blamejs on every push so
      # drift is caught continuously. NON-blocking here (exit 0): the release
      # is gated HARD by docker-publish.yml's lint job + the local
      # `node scripts/release.js preflight`. Blocking every PR on an unrelated
      # upstream release would be noise — the fix is the paste-ready line.
      - name: Currency visibility (actions + vendored blamejs)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_COLOR: '1'
        run: |
          {
            echo "### Currency (informational — release is gated in docker-publish.yml)"
            echo ""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          set +e
          node scripts/release.js actions >> "$GITHUB_STEP_SUMMARY" 2>&1
          A=$?
          node scripts/release.js vendor >> "$GITHUB_STEP_SUMMARY" 2>&1
          V=$?
          set -e
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ "$A" -ne 0 ]; then echo "::warning::A pinned GitHub Action is behind its latest release — see the run summary for the paste-ready SHA pin."; fi
          if [ "$V" -ne 0 ]; then echo "::warning::Vendored blamejs is behind the latest release — run scripts/vendor-update.sh blamejs."; fi
          exit 0

      # ── Summary + PR comment ───────────────────────────────────
      - name: Build summary
        if: always()
        id: summary
        env:
          ESLINT_OUTPUT: ${{ steps.eslint.outputs.output }}
          HADOLINT_OUTPUT: ${{ steps.hadolint_result.outputs.output }}
          SHELLCHECK_OUTPUT: ${{ steps.shellcheck.outputs.output }}
          PATTERNS_OUTPUT: ${{ steps.codebase_patterns.outputs.output }}
        run: |
          ESLINT_OK=${{ steps.eslint.outcome == 'success' }}
          HADOLINT_OK=${{ steps.hadolint.outcome == 'success' }}
          SHELLCHECK_OK=${{ steps.shellcheck.outcome == 'success' }}
          PATTERNS_OK=${{ steps.codebase_patterns.outcome == 'success' }}

          PASS="✅"
          FAIL="❌"

          ESLINT_ICON=$( [ "$ESLINT_OK" = "true" ] && echo "$PASS" || echo "$FAIL" )
          HADOLINT_ICON=$( [ "$HADOLINT_OK" = "true" ] && echo "$PASS" || echo "$FAIL" )
          SHELLCHECK_ICON=$( [ "$SHELLCHECK_OK" = "true" ] && echo "$PASS" || echo "$FAIL" )
          PATTERNS_ICON=$( [ "$PATTERNS_OK" = "true" ] && echo "$PASS" || echo "$FAIL" )

          ALL_OK=true
          [ "$ESLINT_OK" = "true" ] && [ "$HADOLINT_OK" = "true" ] && [ "$SHELLCHECK_OK" = "true" ] && [ "$PATTERNS_OK" = "true" ] || ALL_OK=false

          {
            echo "body<<SUMMARY_EOF"
            if [ "$ALL_OK" = "true" ]; then
              echo "🎉   Linting finished with no errors or warnings   🎉"
              echo ""
            fi
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| ESLint (JS + security) | $ESLINT_ICON |"
            echo "| Hadolint (Dockerfile) | $HADOLINT_ICON |"
            echo "| ShellCheck (shell scripts) | $SHELLCHECK_ICON |"
            echo "| codebase-patterns (vendored) | $PATTERNS_ICON |"

            if [ "$ESLINT_OK" != "true" ] && [ -n "$ESLINT_OUTPUT" ]; then
              echo ""
              echo "<details><summary>ESLint output</summary>"
              echo ""
              echo '```'
              printf '%s\n' "$ESLINT_OUTPUT"
              echo '```'
              echo "</details>"
            fi

            if [ "$HADOLINT_OK" != "true" ] && [ -n "$HADOLINT_OUTPUT" ]; then
              echo ""
              echo "<details><summary>Hadolint output</summary>"
              echo ""
              echo '```'
              printf '%s\n' "$HADOLINT_OUTPUT"
              echo '```'
              echo "</details>"
            fi

            if [ "$SHELLCHECK_OK" != "true" ] && [ -n "$SHELLCHECK_OUTPUT" ]; then
              echo ""
              echo "<details><summary>ShellCheck output</summary>"
              echo ""
              echo '```'
              printf '%s\n' "$SHELLCHECK_OUTPUT"
              echo '```'
              echo "</details>"
            fi

            if [ "$PATTERNS_OK" != "true" ] && [ -n "$PATTERNS_OUTPUT" ]; then
              echo ""
              echo "<details><summary>codebase-patterns output</summary>"
              echo ""
              echo '```'
              printf '%s\n' "$PATTERNS_OUTPUT"
              echo '```'
              echo "</details>"
            fi

            echo "SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "all_ok=$ALL_OK" >> "$GITHUB_OUTPUT"

          # Step summary
          echo "### Lint Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ESLint | $ESLINT_ICON |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Hadolint | $HADOLINT_ICON |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ShellCheck | $SHELLCHECK_ICON |" >> "$GITHUB_STEP_SUMMARY"
          echo "| codebase-patterns | $PATTERNS_ICON |" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const body = process.env.PR_BODY;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Linting')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          PR_BODY: ${{ steps.summary.outputs.body }}

      - name: Fail if any linter failed
        if: always()
        run: |
          if [ "${{ steps.summary.outputs.all_ok }}" != "true" ]; then
            echo "One or more linters failed"
            exit 1
          fi
