# HermitStash — Kubernetes Deployment
#
# Quick start:
#   kubectl apply -f deploy/kubernetes.yml
#   kubectl port-forward -n hermitstash svc/hermitstash 3000:3000
#   open http://localhost:3000
#
# Before deploying:
#   1. Create PersistentVolumeClaims (or use the included ones for local-path)
#   2. Set RP_ORIGIN to your ingress URL
#   3. Configure an Ingress resource for external access
#
# Data is stored in the hermitstash-data PVC (encrypted DB + vault keys).
# Back up the vault.key file — loss means all sealed data is unrecoverable.

---
apiVersion: v1
kind: Namespace
metadata:
  name: hermitstash

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermitstash-data
  namespace: hermitstash
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermitstash-uploads
  namespace: hermitstash
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermitstash
  namespace: hermitstash
  labels:
    app.kubernetes.io/name: hermitstash
    # app.kubernetes.io/version label intentionally omitted — would drift from
    # the deployed image tag whenever this template lags a release. Add it in
    # your overlay (Kustomize / Helm / GitOps tool) where you control the tag.
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hermitstash
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermitstash
    spec:
      containers:
        - name: hermitstash
          image: ghcr.io/dotcoocoo/hermitstash:1
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: HERMITSTASH_TMPDIR
              value: /dev/shm
            - name: PORT
              value: "3000"
            - name: TRUST_PROXY
              value: "true"
            # Container user — mirrors compose defaults. Set 1000:1000 for
            # standard Linux, 99:100 for Unraid-style nobody:users.
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: UMASK
              value: "022"   # 755 dirs, 644 files
            # Container timezone — also drives the default backup TZ unless
            # explicitly overridden via BACKUP_TIMEZONE.
            - name: TZ
              value: "Etc/UTC"
            # Set to your ingress URL (required for passkeys + HSTS)
            - name: RP_ORIGIN
              value: ""   # e.g. https://files.example.com
            # ── Vault passphrase protection (opt-in, v1.9+) ───────────────
            # Default disabled. To enable:
            #   1. Create a Secret:  kubectl create secret generic hermitstash-vault \
            #                          --from-literal=passphrase='YOUR_PASSPHRASE'
            #   2. Uncomment the VAULT_PASSPHRASE_* env + volumeMount below.
            #   3. Before first deploy: run the setup tool via a one-shot Job
            #      (or kubectl exec) to migrate plaintext vault.key → sealed.
            # LOSS of passphrase = LOSS of all encrypted data.
            # - name: VAULT_PASSPHRASE_MODE
            #   value: "required"
            # - name: VAULT_PASSPHRASE_FILE
            #   value: "/run/secrets/vault-passphrase/passphrase"
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: uploads
              mountPath: /app/uploads
            - name: shm
              mountPath: /dev/shm
            # ── Vault passphrase mount (opt-in) ──────────────────────────
            # Uncomment alongside the env vars above. The Secret must contain
            # a `passphrase` key (plain bytes of the passphrase, no trailing
            # newline required — the file source driver trims them).
            # - name: vault-passphrase
            #   mountPath: /run/secrets/vault-passphrase
            #   readOnly: true
          # PQC key generation on first start can take 10-15s — startupProbe
          # gives the container time to initialise before liveness/readiness
          # start polling, avoiding restart loops during initial bootstrap.
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12   # ~60s grace
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: "1"
          securityContext:
            # Container starts as root by design — entrypoint needs to chown
            # PVC mount points and remap PUID/PGID before setpriv-dropping
            # to the unprivileged hermit user. Mirrors the compose-level
            # cap_drop ALL + minimal cap_add pattern.
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN          # chown PVC mount points to hermit:hermit
                - SETUID         # setpriv: drop to hermit UID
                - SETGID         # setpriv: drop to hermit GID
                - DAC_OVERRIDE   # write inside chmod 700 data/uploads dirs
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermitstash-data
        - name: uploads
          persistentVolumeClaim:
            claimName: hermitstash-uploads
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        # ── Vault passphrase Secret volume (opt-in, v1.9+) ───────────────
        # Uncomment alongside the VAULT_PASSPHRASE_* env vars and
        # volumeMount above. Create the Secret first:
        #   kubectl -n hermitstash create secret generic hermitstash-vault \
        #     --from-literal=passphrase='YOUR_PASSPHRASE'
        # - name: vault-passphrase
        #   secret:
        #     secretName: hermitstash-vault
        #     defaultMode: 0400

---
apiVersion: v1
kind: Service
metadata:
  name: hermitstash
  namespace: hermitstash
spec:
  selector:
    app.kubernetes.io/name: hermitstash
  ports:
    - port: 3000
      targetPort: http
      name: http

