# HermitStash — nginx reverse proxy
#
# Drop this into /etc/nginx/sites-available/hermitstash, symlink into
# sites-enabled, obtain a cert with certbot, then `sudo nginx -t && sudo systemctl reload nginx`.
#
# Replace `files.example.com` throughout. Assumes HermitStash runs on
# 127.0.0.1:3000 with TRUST_PROXY=true and RP_ORIGIN=https://files.example.com.
#
# Let's Encrypt:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d files.example.com

# ── WebSocket upgrade map ──────────────────────────────────────────
# Required for /sync/ws — nginx doesn't forward Upgrade/Connection by default.
# Defined at http{} scope; if you already have this map elsewhere, drop this
# block to avoid a duplicate-map warning.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Redirect plain HTTP to HTTPS ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name files.example.com;

    # Allow Let's Encrypt HTTP-01 challenges through unredirected.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── TLS-terminating reverse proxy ──────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name files.example.com;

    ssl_certificate     /etc/letsencrypt/live/files.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/files.example.com/privkey.pem;

    # Modern TLS only. Adjust if you need to support older clients.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # Match MAX_FILE_SIZE in the HermitStash environment (default 100MB).
    # nginx default is 1MB, which silently 413s large uploads.
    client_max_body_size 100m;

    # Long uploads/downloads need generous timeouts.
    client_body_timeout   5m;
    client_header_timeout 1m;
    proxy_connect_timeout 10s;
    proxy_send_timeout    5m;
    proxy_read_timeout    5m;
    send_timeout          5m;

    # Security headers are emitted by HermitStash itself (CSP, HSTS, etc.) —
    # don't duplicate them here or CSP will fail due to header collisions.

    # Don't let nginx buffer uploads/downloads to disk — the app streams
    # ciphertext end-to-end and double-buffering wastes memory.
    proxy_request_buffering off;
    proxy_buffering         off;
    proxy_http_version      1.1;

    location / {
        proxy_pass http://127.0.0.1:3000;

        # Forward standard proxy headers — HermitStash honors these when
        # TRUST_PROXY=true.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket upgrade (used by /sync/ws for the companion sync client).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
