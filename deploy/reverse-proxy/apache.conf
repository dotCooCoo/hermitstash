# HermitStash — Apache reverse proxy
#
# Drop this into /etc/apache2/sites-available/hermitstash.conf, then:
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite ssl headers http2
#   sudo a2ensite hermitstash
#   sudo certbot --apache -d files.example.com
#   sudo systemctl reload apache2
#
# Replace `files.example.com` throughout. Assumes HermitStash runs on
# 127.0.0.1:3000 with TRUST_PROXY=true and RP_ORIGIN=https://files.example.com.
#
# Required modules:
#   proxy, proxy_http  — HTTP reverse proxying
#   proxy_wstunnel     — WebSocket (/sync/ws) forwarding
#   rewrite            — Upgrade-header routing
#   ssl, http2         — TLS and HTTP/2 termination
#   headers            — X-Forwarded-* passthrough

# ── Redirect plain HTTP to HTTPS ───────────────────────────────────
<VirtualHost *:80>
    ServerName files.example.com

    # Let Let's Encrypt HTTP-01 challenges through unredirected.
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^/?(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]
</VirtualHost>

# ── TLS-terminating reverse proxy ──────────────────────────────────
<VirtualHost *:443>
    ServerName files.example.com

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/files.example.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/files.example.com/privkey.pem

    # Modern TLS only. Adjust if you need to support older clients.
    SSLProtocol             -all +TLSv1.2 +TLSv1.3
    SSLHonorCipherOrder     off
    SSLCipherSuite          ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305

    Protocols h2 http/1.1

    # Match MAX_FILE_SIZE in the HermitStash environment (default 100MB = 104857600 bytes).
    # Apache's default LimitRequestBody is effectively unlimited in most distros,
    # but mpm_event + proxy can still cap things. Be explicit.
    LimitRequestBody 104857600

    # Long uploads/downloads need generous timeouts.
    Timeout 300
    ProxyTimeout 300

    # Don't let Apache buffer proxied responses to disk — the app streams
    # ciphertext end-to-end.
    SetEnv proxy-sendchunked 1
    SetEnv proxy-nokeepalive 0

    # Preserve the original Host header; HermitStash uses it for RP_ID checks
    # and cookie scoping. Without this Apache rewrites Host to the backend.
    ProxyPreserveHost On

    # Standard forwarded headers. HermitStash honors these when TRUST_PROXY=true.
    # mod_proxy sets X-Forwarded-For and X-Forwarded-Host automatically;
    # X-Forwarded-Proto must be set explicitly.
    RequestHeader set X-Forwarded-Proto "https"

    # ── WebSocket upgrade (/sync/ws) ───────────────────────────────
    # Route Upgrade:websocket requests through mod_proxy_wstunnel before the
    # generic HTTP proxy rule picks them up.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/(.*)$ ws://127.0.0.1:3000/$1 [P,L]

    # ── HTTP reverse proxy ─────────────────────────────────────────
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Security headers are emitted by HermitStash itself (CSP, HSTS, etc.) —
    # don't duplicate them here or CSP will fail due to header collisions.
</VirtualHost>
