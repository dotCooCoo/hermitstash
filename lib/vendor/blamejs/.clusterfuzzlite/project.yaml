# ClusterFuzzLite project config.
#
# Consumed by `google/clusterfuzzlite/actions/build_fuzzers` and
# `run_fuzzers` (see `.github/workflows/cflite_*.yml`).
#
# The OSS-Fuzz upstream project config under
# `oss-fuzz/projects/blamejs/project.yaml` mirrors this — keep them
# in sync.

language: javascript
fuzzing_engines:
  - libfuzzer
sanitizers:
  - none   # jazzer.js is pure-JS; libFuzzer drives mutation without a native sanitizer
homepage: "https://blamejs.com"
main_repo: "https://github.com/blamejs/blamejs"
