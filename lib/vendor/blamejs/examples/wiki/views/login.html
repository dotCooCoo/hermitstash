{% extends "_layout" %}
{% block onthispage %}{% endblock %}
{% block content %}
<h1>Admin sign-in</h1>
{% if error %}<p class="form-error"><strong>{{ error }}</strong></p>{% endif %}
<form method="post" action="/login" autocomplete="on">
  <input type="hidden" name="csrf" value="{{ csrfToken }}">
  <label for="email">Email</label>
  <input id="email" type="email" name="email" required autocomplete="email" autofocus>
  <label for="password">Password</label>
  <input id="password" type="password" name="password" required autocomplete="current-password">
  <p><button type="submit">Sign in</button></p>
</form>
<aside class="callout">
  <p class="callout-title">Note</p>
  <p>No public registration. The wiki ships with one admin seeded from <code>WIKI_ADMIN_EMAIL</code> + <code>WIKI_ADMIN_PASSWORD</code> at first boot.</p>
</aside>
{% endblock %}
