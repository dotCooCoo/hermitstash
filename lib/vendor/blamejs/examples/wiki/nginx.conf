# nginx config for blamejs.com — reverse-proxy to the wiki container,
# mirroring examples/wiki/Caddyfile for operators who front the wiki with
# nginx instead of Caddy.
#
# Unlike Caddy, nginx does not issue TLS certificates itself. Obtain and
# renew them with certbot (https://certbot.eff.org) — the paths below
# assume the standard certbot layout. Everything else (the TLS floor, the
# forwarded headers the wiki trusts, the www→apex redirect, and HSTS)
# matches the Caddy hardening so the wiki emits its own strong security
# headers rather than a weaker proxy default.
#
# Drop this in /etc/nginx/conf.d/blamejs.conf (or include it from the main
# nginx.conf). Set WIKI_ADMIN_TRUSTED_PROXIES to the CIDR nginx connects
# from so the wiki trusts the X-Forwarded-* headers below (the prod compose
# already defaults it to the private ranges).

# The wiki container speaks plain HTTP on the compose network. "wiki" is
# the compose service name; 3008 is the default WIKI_PORT (override both
# together if you change it).
upstream blamejs_wiki {
    server wiki:3008;
    keepalive 16;
}

# Port 80 — ACME HTTP-01 challenge (certbot webroot) plus a permanent
# redirect of everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name blamejs.com www.blamejs.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 308 https://blamejs.com$request_uri;
    }
}

# Canonicalize www.blamejs.com → apex over TLS (308 preserves method/body).
server {
    # `http2` as a listen parameter works on packaged nginx back to 1.9.5;
    # the standalone `http2 on;` directive is 1.25.1+ only.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.blamejs.com;

    ssl_certificate     /etc/letsencrypt/live/blamejs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blamejs.com/privkey.pem;
    ssl_protocols       TLSv1.3;

    return 308 https://blamejs.com$request_uri;
}

# Apex — TLS termination + reverse proxy to the wiki container.
server {
    # `http2` as a listen parameter works on packaged nginx back to 1.9.5;
    # the standalone `http2 on;` directive is 1.25.1+ only.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name blamejs.com;

    ssl_certificate     /etc/letsencrypt/live/blamejs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blamejs.com/privkey.pem;

    # TLS 1.3 floor, matching the Caddyfile.
    ssl_protocols             TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:blamejs_tls:10m;

    # HSTS two years, subdomains, preload — matches the wiki's own
    # production posture so the header is present even on the proxy edge.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        proxy_pass http://blamejs_wiki;
        proxy_http_version 1.1;

        # Tell the wiki it is behind TLS so its same-origin / CSRF /
        # cookie-Secure logic trusts the edge. WIKI_ADMIN_TRUSTED_PROXIES
        # must include this proxy's address for these to be honored.
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header Host              $host;

        # WebSocket / SSE upgrades used by the wiki's live islands.
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_read_timeout 300s;
    }

    # Docker captures stdout/stderr.
    access_log /dev/stdout;
    error_log  /dev/stderr;
}

# Map for the Connection header on WebSocket upgrades. Place this in the
# http {} context (it is included here for a self-contained reference; if
# your main nginx.conf already defines $connection_upgrade, drop this map).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
