name: ClusterFuzzLite PR fuzzing

# Coverage-guided fuzzing via jazzer.js + libFuzzer against every
# `fuzz/*.fuzz.js` harness on every PR touching `lib/` or `fuzz/`.
#
# We invoke jazzer.js directly instead of going through the
# `google/clusterfuzzlite/actions/build_fuzzers` wrapper — the
# wrapper's v1 Docker image (gcr.io/oss-fuzz-base/clusterfuzzlite-
# build-fuzzers:v1) refuses to fuzz JavaScript projects with any
# sanitizer + refuses to pass empty/`none` sanitizer through, so the
# wrapper is structurally broken for JS as of 2026. The
# `.clusterfuzzlite/` directory remains as the canonical integration
# spec — it's what OSS-Fuzz upstream's `oss-fuzz/projects/blamejs/`
# build.sh mirrors, and what would re-engage if CFLite ships a JS
# fix later.
#
# Findings: jazzer's `-error_exitcode=1` makes the step fail with
# the reproducer printed inline; libFuzzer's crash artifact lands at
# `crash-*` in the workspace.

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'fuzz/**'
      - '.clusterfuzzlite/**'
      - '.github/workflows/cflite_pr.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cflite-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: ClusterFuzzLite ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target:
          - safe-json
          - safe-url
          - safe-jsonpath
          - guard-csv
          - guard-html
          - guard-json
          - guard-yaml
          - guard-xml
          - guard-svg
          - guard-markdown
          - guard-email
          - parsers__safe-toml
          - parsers__safe-yaml
          - parsers__safe-xml
          - parsers__safe-ini
          - safe-mime
          - guard-message-id
          - guard-mail-query
          - guard-mail-compose
          - guard-mail-reply
          - guard-mail-move
          - guard-mail-sieve
          - guard-agent-registry
          - guard-idempotency-key
          - guard-stream-args
          - guard-event-bus-topic
          - guard-event-bus-payload
          - guard-tenant-id
          - guard-saga-config
          - guard-posture-chain
          - guard-trace-context
          - guard-snapshot-envelope
          - safe-smtp
          # Untrusted-byte parsers not named safe-*/guard-* (asn1-der feeds every
          # certificate path: peer TLS, S/MIME, BIMI, CMS, ACME, TSA).
          - asn1-der
          - cms-codec
          - link-header
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '24'

      - name: Install jazzer.js
        run: npm ci --prefix fuzz

      - name: Fuzz ${{ matrix.target }}
        env:
          # 60s on PR (per-target). cflite_batch.yml runs the deeper
          # 1800s schedule that surfaces paths this budget can't reach.
          FUZZ_TIME: '60'
        run: |
          set -e
          harness="fuzz/${{ matrix.target }}.fuzz.js"
          corpus="fuzz/${{ matrix.target }}_seed_corpus"
          echo "::group::jazzer fuzz $harness ($FUZZ_TIME s)"
          # Pass seed corpus as first positional arg when present;
          # libFuzzer treats directory args as corpus inputs.
          if [ -d "$corpus" ]; then
            npx --prefix fuzz jazzer "$harness" "$corpus" -- \
              -max_total_time="$FUZZ_TIME" -error_exitcode=1 -timeout=30
          else
            npx --prefix fuzz jazzer "$harness" -- \
              -max_total_time="$FUZZ_TIME" -error_exitcode=1 -timeout=30
          fi
          echo "::endgroup::"

      - name: Upload crash artifact
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: |
            crash-*
            leak-*
            timeout-*
          if-no-files-found: ignore
