name: CodeQL SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "31 5 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  analyze:
    name: CodeQL analysis (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      # CodeQL maintains a single combined language ID for JavaScript +
      # TypeScript. The framework ships CommonJS JavaScript only (no
      # transpilation step — every transpilation hop is a supply-chain
      # hop); the language ID picks up the .js files under lib/ +
      # scripts/ regardless.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: javascript-typescript
          # security-extended adds higher-precision queries beyond the
          # default suite. The query pack catches: SQL injection, XSS,
          # prototype pollution, command injection, ReDoS, unsafe
          # deserialization, server-side request forgery, hardcoded
          # credentials. Findings surface as SARIF in the Security tab.
          queries: security-extended

      # Auto-build is skipped because CommonJS files don't need a build
      # step; CodeQL extracts straight from source.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          category: "/language:javascript-typescript"
