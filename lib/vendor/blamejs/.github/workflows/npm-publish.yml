# Publish @blamejs/core to the npm registry on every `v*` tag push.
#
# Same trigger shape as release-container.yml, but a separate workflow
# so a failure in one doesn't block the other (npm publish failures
# shouldn't keep the GHCR image from shipping; container failures
# shouldn't block an operator from `npm install @blamejs/core`).
#
# Supply-chain posture matches the container release:
#   - npm publish --provenance attaches a SLSA v1 provenance attestation
#     tying the published tarball to this exact GitHub Actions workflow
#     run + commit + tag (visible at https://www.npmjs.com/package/@blamejs/core
#     → "Provenance" on each version).
#   - Lint + smoke gate runs before publish; a tag-time test regression
#     never lands on the npm registry.
#   - Version match: the package.json "version" must equal the pushed
#     tag minus the leading "v". Tag drift fails the publish.
#
# `workflow_dispatch.dry_run` lets an operator exercise the validation
# + lint + test path without actually pushing to npm — useful for
# verifying a package.json change before tagging.
#
# Job structure:
#   - `validate`: lint, smoke, SBOM, OSV scan, pack tarball. No NPM_TOKEN
#     access; runs from any ref (tag push, manual dispatch, dry-run).
#     Uploads the packed tarball + SBOMs as an artifact for the publish job.
#   - `publish`: downloads the artifact, signs the SBOMs, runs
#     `npm publish` on the prebuilt tarball. Gated by
#     `environment: npm-publish` whose deployment-branch policy is
#     `tag: v*.*.*` — only tag pushes can enter, and the job's `if:`
#     additionally excludes `inputs.dry_run`. NPM_TOKEN lives only in
#     the env (no other workflow in this repo can read it).
#   - `summary`: always runs; renders the job-outcome table to the
#     run's step summary.

name: npm publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + lint + smoke without publishing to npm'
        type: boolean
        default: true

# Workflow-level is read-only; the publish job's permissions block
# below elevates contents:write (gh release asset upload) and
# id-token:write (npm provenance + sigstore cosign).
permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Lint, smoke, SBOM, pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # 30-min cap covers lint + smoke + wiki e2e + cold npx eslint pull
    # + SBOM generation. v0.6.38 → v0.6.53 all timed out at the previous
    # 15-min cap, leaving npm registry stuck at v0.6.37. Bumped along
    # with v0.6.54.
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_tag:  ${{ steps.version.outputs.is_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.0

      - name: Set up Node 24.14.1 LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.0.0
        with:
          node-version: '24.14.1'

      - name: Compute version
        id: version
        run: |
          # On tag push: derive version from the tag (strip leading "v").
          # On workflow_dispatch (no tag): just pull from package.json
          # and validate, but don't expect a tag match.
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            TAG_REF="${GITHUB_REF#refs/tags/v}"
            if [ "$TAG_REF" != "$PKG_VERSION" ]; then
              echo "::error::Tag-version drift: pushed tag is v$TAG_REF but package.json version is $PKG_VERSION."
              echo "::error::Bump package.json AND tag the same version on a single commit."
              exit 1
            fi
            echo "is_tag=true"      >> "$GITHUB_OUTPUT"
            echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "is_tag=false"     >> "$GITHUB_OUTPUT"
            echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved version: $PKG_VERSION (tag-push: ${GITHUB_REF#refs/tags/})"

      # Lint gate. ESLint covers the framework JS surface; shellcheck
      # covers vendor-update.sh + docker init scripts (these ARE in the
      # npm tarball, so a regression should fail the publish). Hadolint
      # stays in release-container.yml only — the Dockerfile is
      # container-only and is not part of the npm artifact.
      - name: ESLint (max-warnings 0)
        # Pinned to a known-good eslint version. `eslint@latest` was
        # silently letting new rule additions fail the publish gate
        # on a release that had passed `eslint@<previous>` cleanly the
        # day before. The pin moves with operator-confirmed bumps,
        # not whatever the npm registry happens to ship.
        run: npx --yes eslint@10.3.0 --max-warnings 0 .

      - name: Detect shell scripts
        id: sh
        run: |
          count=$(git ls-files '*.sh' | wc -l)
          echo "Tracked .sh files: $count"
          git ls-files '*.sh' || true
          echo "found=$count" >> "$GITHUB_OUTPUT"

      - name: ShellCheck
        if: steps.sh.outputs.found != '0'
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # v2.0.0
        with:
          severity: style
          format:   tty
          check_together: 'yes'

      - name: Install devDependencies (esbuild + postject for bundler-output smoke gate)
        # bundler-output.test.js (v0.9.10+) loads esbuild via its JS API
        # instead of `npx --yes esbuild`, so devDependencies must be
        # present before the test runs. The framework still ships ZERO
        # runtime deps — devDependencies don't reach the npm tarball
        # per the `files` allowlist in package.json. Mirrors the same
        # step in .github/workflows/ci.yml.
        #
        # Each devDependency is installed by exact name@version (the
        # same pins package.json carries) so CodeQL's PinnedDependencies
        # query sees a version-pinned install rather than a bare
        # `npm install` that resolves dynamically. blamejs deliberately
        # does not commit a lockfile (CLAUDE.md hard rule §1 — zero npm
        # runtime deps; transpilation hops are supply-chain hops); the
        # explicit name@version specifiers are the source-of-truth pin.
        run: npm install --no-audit --no-fund --no-save esbuild@0.28.0 postject@1.0.0-alpha.6

      - name: Framework smoke
        # The smoke runner forks per-test workers (each gets 8GB via
        # execArgv); the parent process itself loads every test module
        # too and needs the same headroom now that v0.10.0 added the
        # mail-stack + audit-fix test surface. Default ~4GB heap OOMs
        # on the GitHub runner. NODE_OPTIONS applies to the parent.
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: node test/smoke.js

      - name: Wiki e2e
        working-directory: examples/wiki
        run: |
          rm -rf data data-e2e
          npm install --no-package-lock --omit=dev --install-links
          node test/e2e.js

      - name: Generate CycloneDX SBOM (1.6)
        # `npm sbom` ships with npm 10+ (Node 24 LTS). Generates a
        # CycloneDX JSON file from package.json + the lockfile.
        # blamejs has zero npm runtime deps so the SBOM is small —
        # the value is the discoverability signal (operators / supply-
        # chain scanners can verify there's nothing hidden) plus the
        # CI gate that catches a leaked dep being added.
        #
        # npm 10's `npm sbom --sbom-format cyclonedx` emits CycloneDX
        # 1.5 by default; we post-process the specVersion to 1.6 so
        # the SBOM tracks the latest CycloneDX-supported metadata
        # surface (lifecycle phases, license expressions, evidence
        # blocks). The schema migration from 1.5 → 1.6 is additive;
        # no field renames break consumers.
        run: |
          npm sbom --sbom-format cyclonedx --omit dev > sbom.cdx.json
          node -e "
            var fs = require('fs');
            var s = JSON.parse(fs.readFileSync('sbom.cdx.json', 'utf8'));
            s.specVersion = '1.6';
            // CycloneDX 1.6 introduces \`metadata.lifecycles\` —
            // mark this artifact as the post-build BOM.
            s.metadata = s.metadata || {};
            s.metadata.lifecycles = [{ phase: 'build' }];
            fs.writeFileSync('sbom.cdx.json', JSON.stringify(s, null, 2));
          "
          echo "[sbom] wrote sbom.cdx.json ($(wc -c < sbom.cdx.json) bytes, specVersion=1.6)"
          # v0.8.77 — emit the vendored-deps CycloneDX alongside. This is
          # the SBOM downstream scanners actually need: the primary
          # sbom.cdx.json describes the npm package's (empty) runtime-dep
          # set; sbom.vendored.cdx.json describes the actual code shipping
          # inside the tarball (lib/vendor/*). OSV-Scanner runs against
          # this in the next step.
          node scripts/build-vendored-sbom.js > sbom.vendored.cdx.json
          echo "[sbom] wrote sbom.vendored.cdx.json ($(wc -c < sbom.vendored.cdx.json) bytes; $(grep -c '"bom-ref"' sbom.vendored.cdx.json) components)"
          # Refuse the publish if any runtime dep snuck in. The framework's
          # zero-dep contract says lib/vendor/ holds everything; runtime
          # deps in package.json would silently break that.
          RUNTIME_DEPS=$(node -e "
            var s = JSON.parse(require('fs').readFileSync('sbom.cdx.json', 'utf8'));
            var comps = (s.components || []).filter(function (c) {
              return c.scope !== 'optional' && c.scope !== 'excluded' &&
                     c['bom-ref'] !== s.metadata.component['bom-ref'];
            });
            console.log(comps.length);
          ")
          if [ "$RUNTIME_DEPS" -gt 0 ]; then
            echo "::error::SBOM lists $RUNTIME_DEPS runtime dependency component(s)."
            echo "::error::blamejs ships zero npm runtime deps — vendor any new dep into lib/vendor/."
            exit 1
          fi

      - name: Vulnerability scan (OSV-Scanner)
        # Scans the SBOM (which covers the published surface) plus
        # lib/vendor/ (which covers the bundled-but-not-in-SBOM
        # surface — the framework's vendored deps don't appear in
        # `npm sbom` because they're CommonJS bundles, not npm deps).
        # Default v2 behavior: exit 1 on ANY OSV / CISA-KEV finding.
        # Stricter than v1's `--fail-on-vuln=HIGH` (which v2 dropped),
        # appropriate for a zero-npm-runtime-dep framework where any
        # surfaced vuln means a vendor refresh is overdue.
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --sbom=sbom.cdx.json
            --sbom=sbom.vendored.cdx.json
            -r lib/vendor/

      - name: Pack tarball (the exact bytes that will be published)
        # Build the tarball HERE, in the validate job, so the publish
        # job receives bit-for-bit the artifact that passed every gate
        # above. npm publish on the packed tarball still attaches SLSA
        # provenance for the workflow run that calls publish (publish
        # job below) — provenance signs the tarball bytes + the workflow
        # run context, not the working tree at publish-call-time.
        run: |
          mkdir -p dist
          npm pack --pack-destination ./dist
          ls -lh dist/

      - name: Upload publish bundle (tarball + SBOMs)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: publish-bundle
          path: |
            dist/*.tgz
            sbom.cdx.json
            sbom.vendored.cdx.json
            package.json
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Sign SBOMs + publish to npm
    needs: validate
    # Gate the publish job structurally:
    #   - Must be a tag push (workflow_dispatch can't reach this job).
    #   - Must NOT be a dry-run.
    #   - `environment: npm-publish` adds a second gate via its
    #     deployment-branch policy (`tag: v*.*.*`) — a branch ref can't
    #     enter the env even if `if:` permitted, so accidental publish-
    #     from-branch is structurally impossible at two layers.
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run && needs.validate.outputs.is_tag == 'true' }}
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write   # gh release upload (SBOM asset)
      id-token: write   # OIDC token for npm provenance + sigstore cosign
    # Publish-only steps run fast — no test surface, no compilation.
    # 15-min cap is generous; cosign + npm publish typically complete
    # in under 90 seconds combined.
    timeout-minutes: 15
    steps:
      - name: Set up Node 24.14.1 LTS + npm registry auth
        # Re-run setup-node here so the publish job's environment has
        # the registry-url wiring for `npm publish` auth. The validate
        # job's setup-node did NOT register a registry-url (it never
        # talks to the registry).
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.0.0
        with:
          node-version: '24.14.1'
          registry-url: 'https://registry.npmjs.org'

      - name: Download publish bundle (tarball + SBOMs)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v7.0.1
        with:
          name: publish-bundle

      # Fail loud + early if the NPM_TOKEN secret isn't visible to this
      # workflow run. The publish step otherwise produces an opaque
      # ENEEDAUTH after ~60s of npm registry churn. Diagnostic message
      # points operators at the env-scoped location (the prior repo-
      # scoped + org-scoped tokens were both moved to env-scope as part
      # of the v0.12.16 audit goal).
      - name: Verify NPM_TOKEN is reachable
        env:
          NPM_TOKEN_REACHABLE: ${{ secrets.NPM_TOKEN != '' }}
        run: |
          if [ "$NPM_TOKEN_REACHABLE" != "true" ]; then
            echo "::error::NPM_TOKEN secret is empty in this workflow run."
            echo "::error::Check at: https://github.com/blamejs/blamejs/settings/environments/npm-publish"
            echo "::error::  - Confirm a secret named NPM_TOKEN exists in the npm-publish environment"
            echo "::error::  - Confirm the env's deployment-branch policy includes the tag this workflow ran on"
            echo "::error::  - Confirm the secret value is not empty/whitespace"
            exit 1
          fi
          echo "NPM_TOKEN secret is reachable (length will be revealed only by the npm publish step)."

      - name: Install cosign (sigstore keyless)
        # Sigstore keyless signing — the workflow's OIDC token (line
        # 51 — `id-token: write`) is exchanged with Sigstore's Fulcio
        # for a short-lived cert bound to the workflow identity, then
        # cosign signs the SBOM. Verifiers reach for the Rekor
        # transparency log entry (cosign emits a .sig + the
        # transparency-log inclusion proof in the .sigstore bundle).
        # Operators verify the signed SBOM via the recipe documented in
        # SECURITY.md — the identity-regexp pins BOTH the workflow path
        # (npm-publish.yml) AND the tag-ref shape (refs/tags/v<semver>)
        # so a maliciously-introduced sibling workflow under the same
        # repo cannot satisfy the gate, and --rekor-url is pinned so
        # DNS / HTTPS MITM cannot redirect the transparency-log lookup:
        #   cosign verify-blob \
        #     --certificate-identity-regexp \
        #       '^https://github.com/blamejs/blamejs/\.github/workflows/npm-publish\.yml@refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$' \
        #     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
        #     --rekor-url "https://rekor.sigstore.dev" \
        #     --bundle sbom.cdx.json.sigstore \
        #     sbom.cdx.json
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Cosign sign-blob SBOMs
        run: |
          # Sign the primary npm-tree SBOM…
          cosign sign-blob --yes \
            --bundle sbom.cdx.json.sigstore \
            sbom.cdx.json
          echo "[cosign-sbom] signed sbom.cdx.json; bundle at sbom.cdx.json.sigstore"

          # …and the vendored-deps SBOM (the higher-value artifact for
          # downstream scanners since it lists what's actually shipping
          # under lib/vendor/* with per-file sha256 + purl).
          cosign sign-blob --yes \
            --bundle sbom.vendored.cdx.json.sigstore \
            sbom.vendored.cdx.json
          echo "[cosign-sbom] signed sbom.vendored.cdx.json; bundle at sbom.vendored.cdx.json.sigstore"

      - name: Attach SBOMs as release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:      v${{ needs.validate.outputs.version }}
        run: |
          # The release was created by the operator's `gh release create`
          # step before this workflow ran. We attach BOTH SBOMs + both
          # sigstore bundles as a second access path (alongside the npm
          # tarball, which also includes them). The vendored SBOM is the
          # one downstream scanners care about — it describes the actual
          # code shipping under lib/vendor/*; the npm-tree SBOM is the
          # CycloneDX 1.6 view of the (empty) npm dep tree.
          #
          # Failure modes we tolerate:
          #   - HTTP 422 "Cannot upload assets to an immutable release"
          #     when the repo has the immutable-releases setting on.
          #     SBOMs are still in the npm tarball; the GitHub release
          #     attachment is supplementary, not load-bearing.
          #   - Asset already exists (--clobber re-uploads).
          # Any other failure is logged but does not fail the publish —
          # the npm package is the canonical artifact.
          set +e
          OUT=$(gh release upload "$TAG" \
            sbom.cdx.json sbom.cdx.json.sigstore \
            sbom.vendored.cdx.json sbom.vendored.cdx.json.sigstore \
            --repo "$GITHUB_REPOSITORY" --clobber 2>&1)
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ]; then
            echo "[sbom-attach] uploaded primary + vendored SBOMs to release $TAG"
          else
            echo "[sbom-attach] upload failed (status=$STATUS):"
            echo "$OUT"
            if echo "$OUT" | grep -qi "immutable release"; then
              echo "::warning::GitHub repo has immutable releases enabled — SBOMs not attached to GH release. The SBOMs are still bundled in the npm tarball at sbom.cdx.json + sbom.vendored.cdx.json (npm install @blamejs/core && cat node_modules/@blamejs/core/sbom.vendored.cdx.json)."
            else
              echo "::warning::SBOM attach to GH release failed for $TAG — the npm tarball is the canonical SBOM source."
            fi
          fi

      - name: Verify npm registry signing chain (npm audit signatures)
        # `npm audit signatures` verifies the cryptographic signing chain
        # for every package in the install tree against the npm registry's
        # public keys. blamejs ships zero npm runtime deps so the tree is
        # trivially empty today — the step's purpose here is regression-
        # defense: if a future patch accidentally adds a runtime dep, this
        # gate catches an unsigned registry entry before the publish step
        # proceeds.
        #
        # Gate logic — invariant-driven, not error-message-driven:
        #
        # The framework's zero-npm-runtime-deps posture means
        # `package.json`'s `"dependencies"` is the empty object `{}`. We
        # check that invariant FIRST, before invoking audit-signatures.
        # If it holds: the framework has nothing in the runtime tree to
        # sign, and audit-signatures has nothing meaningful to verify.
        # Skip with a regression-armed log line.
        #
        # If a future patch adds a runtime dep (any shape — registry,
        # file:, git:, link:), this branch falls through and runs
        # audit-signatures for real. The step then requires exit 0 OR
        # an explicit empty-tree message; it does NOT accept the newer
        # npm phrasing `no dependencies to audit that were installed
        # from a supported registry`, because that message ALSO fires
        # when deps exist but are unverifiable (file:/git:/etc.) — a
        # state the gate is supposed to refuse, not paper over.
        run: |
          set +e
          RUNTIME_DEP_COUNT=$(node -e "console.log(Object.keys(require('./package.json').dependencies || {}).length)")
          if [ "$RUNTIME_DEP_COUNT" = "0" ]; then
            echo "[npm-audit-signatures] package.json declares zero runtime dependencies — invariant holds; regression gate armed for the first dep added."
            exit 0
          fi
          echo "Runtime dependencies declared in package.json: $RUNTIME_DEP_COUNT"
          OUT=$(npm audit signatures --omit dev 2>&1)
          STATUS=$?
          set -e
          echo "$OUT"
          if [ "$STATUS" -eq 0 ]; then
            echo "[npm-audit-signatures] registry signing chain verified for $RUNTIME_DEP_COUNT runtime dep(s)"
            exit 0
          fi
          echo "::error::npm audit signatures failed — runtime deps exist but couldn't be verified against the registry signing chain"
          exit "$STATUS"

      - name: Publish to npm (with SLSA provenance)
        # `npm publish <tarball>` publishes the EXACT bytes the validate
        # job packed (and OSV-scanned). Provenance is generated by the
        # publish step against this workflow run's context — the
        # attestation links the tarball bytes to this commit + tag +
        # workflow run. Verifiable via `npm view @blamejs/core@<version>`
        # → "Provenance" tab on the registry UI.
        #
        # The leading `./` is load-bearing — without it npm 10+
        # mis-classifies a relative path containing `/` as a git spec
        # and tries `git ls-remote ssh://git@github.com/dist/...tgz`
        # (v0.9.30 + v0.9.37 publish failed on exactly this; SSH
        # auth refused, exit 128). With `./` the path is unambiguous
        # as a local tarball.
        run: |
          TARBALL=$(ls dist/*.tgz | head -1)
          echo "Publishing: $TARBALL"
          npm publish "./${TARBALL}" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  summary:
    name: Build summary
    needs: [validate, publish]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Render outcome table
        env:
          IS_TAG:          ${{ needs.validate.outputs.is_tag || 'false' }}
          VERSION:         ${{ needs.validate.outputs.version || 'unknown' }}
          DRY_RUN:         ${{ inputs.dry_run || 'false' }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
          PUBLISH_RESULT:  ${{ needs.publish.result }}
        run: |
          {
            echo "### npm publish"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Package**         | \`@blamejs/core\` |"
            echo "| **Version**         | \`${VERSION}\` |"
            echo "| **Tag push**        | ${IS_TAG} |"
            echo "| **Dry run**         | ${DRY_RUN} |"
            echo "| **Validate job**    | ${VALIDATE_RESULT} |"
            echo "| **Publish job**     | ${PUBLISH_RESULT} |"
            echo "| **Registry**        | https://registry.npmjs.org |"
            if [ "$IS_TAG" = "true" ] && [ "$DRY_RUN" != "true" ] && [ "$PUBLISH_RESULT" = "success" ]; then
              echo "| **Provenance**      | https://www.npmjs.com/package/@blamejs/core/v/${VERSION} → Provenance tab |"
            fi
            echo ""
            echo "Operators can install with:"
            echo ""
            echo '```bash'
            echo "npm install @blamejs/core@${VERSION}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
