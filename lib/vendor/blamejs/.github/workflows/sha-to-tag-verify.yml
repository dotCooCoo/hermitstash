# Tag-push integrity gate. Runs on every `v*` tag push and refuses to
# let the publish workflow start if the tag's commit SHA isn't on
# main's first-parent history OR wasn't the result of a merged PR.
#
# Defends against the tag-mutation class (CVE-2025-30066:
# `tj-actions/changed-files` retroactive tag rewrite, 23,000+ affected
# repos, March 2025) and the source-side-malicious-publish class
# (TanStack 2025-05-11: 84 `@tanstack/*` versions published with valid
# SLSA L3 provenance because the source side was compromised).
#
# Operators verifying release integrity locally run the same chain
# via the recipe in SECURITY.md → "Verifying release-commit integrity".

name: sha-to-tag verify

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to verify (e.g. v0.11.21)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: sha-to-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify tag SHA is on main's first-parent + merged via PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history needed for first-parent walk)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Refresh origin/main reference
        # actions/checkout fetches refs for the checked-out ref (the tag
        # in this case) — it does NOT fetch remote branches like main as
        # a side effect, so `git rev-list --first-parent origin/main`
        # walks a stale (or absent) ref. Fetch main explicitly so the
        # first-parent walk sees the current squash-merge HEAD.
        run: git fetch origin main:refs/remotes/origin/main

      - name: Resolve tag + verify chain
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          # Hoisted: a workflow_dispatch input is operator-supplied text;
          # inlining ${{ github.event.inputs.tag }} into the shell is the
          # template-injection vector. Reference $INPUT_TAG instead.
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "::group::Tag under verification"
          echo "tag: $TAG"
          echo "::endgroup::"

          # 1. Resolve the commit the tag points at.
          SHA=$(git rev-list -n 1 "$TAG")
          echo "::group::Tag commit SHA"
          echo "sha: $SHA"
          echo "::endgroup::"

          # 2. Confirm the SHA is on main's FIRST-PARENT history.
          #    `git merge-base --is-ancestor` only proves reachability
          #    via ANY parent chain — a commit on a merged PR branch
          #    that isn't on main's first-parent path would still
          #    pass that test. The strict first-parent invariant is
          #    what the project's squash-merge policy actually
          #    produces; check it directly.
          #
          #    Capture rev-list output first, then grep against a
          #    here-string. The obvious-looking
          #      `git rev-list --first-parent origin/main | grep -qx "$SHA"`
          #    is a `set -o pipefail` + `grep -q` trap: when grep -q
          #    finds the match it exits early and closes its stdin,
          #    rev-list gets SIGPIPE and exits 141, and pipefail then
          #    propagates 141 as the pipeline's exit. The outer
          #    `if !` negates 141 → enters the false-fail branch
          #    every time on a long first-parent chain. (False-failed
          #    every release v0.13.18-.22.) The here-string consumes
          #    rev-list to completion first; no pipe, no SIGPIPE.
          FIRST_PARENT=$(git rev-list --first-parent origin/main)
          if ! grep -qFx "$SHA" <<<"$FIRST_PARENT"; then
            echo "::error::tag $TAG points at $SHA which is NOT on main's first-parent history"
            echo "::error::this means the tag was created from a side-branch commit that never merged via the project's squash-merge flow"
            echo "::error::the publish workflow refuses to proceed; investigate before re-tagging"
            exit 1
          fi
          echo "::notice::on first-parent main: OK"

          # 3. Confirm the commit was merged via a PR (squash-merge SHA
          #    appears once on first-parent; refuses on direct push to
          #    main).
          PR=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${SHA}/pulls" --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "::error::tag $TAG points at $SHA which was NOT merged via a PR"
            echo "::error::direct push to main bypasses the required-checks ruleset"
            echo "::error::the publish workflow refuses to proceed; rebuild the change as a PR + merge + re-tag"
            exit 1
          fi
          echo "::notice::merged via PR #${PR}: OK"

          # 4. Confirm the tag itself is annotated AND SSH-signed.
          #    `git cat-file -t` only distinguishes lightweight vs
          #    annotated; `git tag -v` is the one that walks the
          #    SSH-signature chain against the maintainer's
          #    allowed_signers entry. The repo's `release-tags`
          #    ruleset has `required_signatures` enabled, so the
          #    server-side gate already refuses unsigned tags on
          #    push — this check is the belt-and-suspenders
          #    workflow-side gate that runs the same chain locally.
          OBJECT_TYPE=$(git cat-file -t "$TAG")
          if [ "$OBJECT_TYPE" != "tag" ]; then
            echo "::error::tag $TAG is a lightweight tag ($OBJECT_TYPE), not annotated"
            echo "::error::v0.9.7+ release tags must be annotated + SSH-signed"
            exit 1
          fi
          # Capture the maintainer's allowed_signers entry inline
          # (matches the SECURITY.md "Verifying release authenticity"
          # recipe). The pubkey + fingerprint are operator-published;
          # the workflow re-derives both for self-contained verify.
          curl -fsSL https://github.com/dotCooCoo.keys                                                       \
            | grep "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPiE/PETpyiVPd8aMygJ+S9CsSVolp4HQZaAuiYVwbBa"      \
            | awk '{print "RobertLeeLW@gmail.com namespaces=\"git\" "$1" "$2}'                             \
            > /tmp/blamejs-allowed-signers
          if ! git -c gpg.ssh.allowedSignersFile=/tmp/blamejs-allowed-signers tag -v "$TAG"; then
            echo "::error::tag $TAG failed SSH-signature verification against the maintainer's pinned key"
            echo "::error::SECURITY.md publishes the expected fingerprint (SHA256:5oF/XWhFpMde9TRfEX2GAHiApAq/MXOS4vti5zQbD7g)"
            exit 1
          fi
          echo "::notice::annotated + SSH-signed tag: OK"

          # 5. Emit the verified chain to the step summary for operator
          #    visibility (release-page footer cross-reference).
          {
            echo "### sha-to-tag verification"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Tag | \`${TAG}\` |"
            echo "| Tag commit SHA | \`${SHA}\` |"
            echo "| Merged via | PR #${PR} |"
            echo "| Tag object type | annotated + SSH-signed |"
            echo "| Verdict | PASS — tag SHA is on main's first-parent + result of a PR merge + signature verified against maintainer key |"
          } >> "$GITHUB_STEP_SUMMARY"
