version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "github-actions"

  - package-ecosystem: "npm"
    directory: "/examples/wiki"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "examples"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "devdeps"

  - package-ecosystem: "docker"
    directory: "/examples/wiki"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "deps"
      - "docker"

  # Keeps the digest-pinned oss-fuzz base-builder in .clusterfuzzlite/Dockerfile
  # current (the oss-fuzz/projects/ submission copy is intentionally unpinned —
  # it tracks upstream, see that file's header).
  - package-ecosystem: "docker"
    directory: "/.clusterfuzzlite"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "deps"
      - "docker"
