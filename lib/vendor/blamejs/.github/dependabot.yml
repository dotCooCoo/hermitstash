version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "github-actions"
    # codeql-action ships init / analyze / upload-sarif from one repo at one
    # version. Split PRs leave the workflows on mixed versions, which the
    # actions-currency gate refuses and the CodeQL bundle rejects at run
    # time — group them so every bump arrives as a single coherent PR.
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action*"

  - package-ecosystem: "npm"
    directory: "/examples/wiki"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "examples"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "devdeps"

  - package-ecosystem: "npm"
    directory: "/fuzz"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "fuzz"

  - package-ecosystem: "docker"
    directory: "/examples/wiki"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "deps"
      - "docker"

  # Keeps the digest-pinned oss-fuzz base-builder in .clusterfuzzlite/Dockerfile
  # current — the single tracked source. The oss-fuzz/projects/ submission copy
  # now mirrors this same digest (scripts/pin-all.js syncs it; pin-all --check
  # gates the two staying identical), so it needs no separate updater.
  - package-ecosystem: "docker"
    directory: "/.clusterfuzzlite"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "deps"
      - "docker"
