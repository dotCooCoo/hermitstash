@version: current
@include "scl.conf"

# Test-only syslog-ng config. Listens on plain UDP/TCP 514 and
# TLS 6514 with our pki-init-issued cert.

options {
  chain_hostnames(no);
  flush_lines(0);
  use_dns(no);
  use_fqdn(no);
  keep_hostname(yes);
};

source s_udp { network(transport(udp) port(514)); };
source s_tcp { network(transport(tcp) port(514)); };
source s_tls {
  network(
    transport(tls)
    port(6514)
    tls(
      key-file("/certs/syslog.key")
      cert-file("/certs/syslog.crt")
      ca-file("/certs/ca.crt")
      peer-verify(no)
    )
  );
};

destination d_file { file("/var/log/blamejs-test.log"); };

log { source(s_udp); destination(d_file); };
log { source(s_tcp); destination(d_file); };
log { source(s_tls); destination(d_file); };
