# Squid forward proxy — test-only, exercises lib/http-client.js's
# proxy code path and lib/ssrf-guard.js against a real proxy hop.
# Bound to 127.0.0.1 on the host; no external exposure.

http_port 3128

# ACL definitions. Order-of-evaluation matters: the framework uses
# CONNECT even for plain HTTP (some proxies require this); allow CONNECT
# to every test-stack port without restriction.
acl localnet src 0.0.0.0/0
acl localnet src ::/0
acl all_ports port 1-65535
acl CONNECT method CONNECT

# Open access (test-only). Allow direct + CONNECT to any port.
http_access allow CONNECT all_ports
http_access allow all

refresh_pattern .  0  20%  4320

# Modest log verbosity so test output stays readable.
access_log /dev/null
cache_log /dev/null
cache deny all
