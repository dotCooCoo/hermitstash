# HAProxy config — TLS-terminating reverse proxy in front of redis,
# postgres, and minio so blamejs's clients can be exercised through
# a real proxy hop (X-Forwarded-For, PROXY protocol, TLS termination).
#
# Listeners:
#   8443 — HTTPS reverse proxy → caddy:80
#   6380 — TLS-pass-through to redis-tls (testing TLS-passthrough vs
#          TLS-termination paths in the framework's redis-client)

global
  log stdout format raw local0
  maxconn 4096
  ssl-default-bind-options ssl-min-ver TLSv1.3 no-tls-tickets
  ssl-default-bind-ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA384
  # Hybrid-PQC group preference. HAProxy 3.x linked against OpenSSL
  # 3.5+ honours this; older builds ignore the unknown group.
  ssl-default-bind-curves X25519MLKEM768:X25519:secp384r1

defaults
  log     global
  mode    http
  option  httplog
  option  dontlognull
  timeout connect 5s
  timeout client  60s
  timeout server  60s

frontend stats
  bind 0.0.0.0:8404
  bind :::8404
  mode http
  stats enable
  stats uri /stats
  stats refresh 10s

frontend https_in
  bind 0.0.0.0:8443 ssl crt /certs/haproxy.combined.pem
  bind :::8443       ssl crt /certs/haproxy.combined.pem
  default_backend caddy_back
  http-request set-header X-Forwarded-Proto https
  http-request set-header X-Forwarded-Port  8443

backend caddy_back
  server caddy caddy:80 check inter 10s

# TCP-mode TLS-passthrough listener for raw protocol clients.
listen redis_passthrough
  bind 0.0.0.0:6390
  bind :::6390
  mode tcp
  option tcplog
  server redis_tls redis:6380 check
