# RabbitMQ config — exposes both plain AMQP (5672) and AMQPS (5671)
# listeners. Default user is the env-var override blamejs/blamejs_test
# from the compose file.

listeners.tcp.default = 5672

listeners.ssl.default            = 5671
ssl_options.cacertfile           = /certs/ca.crt
ssl_options.certfile              = /certs/rabbitmq.crt
ssl_options.keyfile               = /certs/rabbitmq.key
ssl_options.verify                = verify_none
ssl_options.fail_if_no_peer_cert = false
ssl_options.versions.1            = tlsv1.3

management.tcp.port = 15672

# Quiet boot — keep noise out of test output.
log.console.level = warning
