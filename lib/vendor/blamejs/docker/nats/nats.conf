# NATS config for blamejs integration testing.
# Listens on BOTH plain (4222) and TLS (4223) ports.
# JetStream enabled. Monitoring on 8222.
#
# PQC posture: NATS is Go-based; if the underlying Go runtime is 1.24+
# the TLS stack offers X25519MLKEM768 hybrid by default. Curve_preferences
# below requests it explicitly so older runtimes that ignore unknown
# groups still negotiate a safe classical fallback.

port: 4222
http_port: 8222
server_name: blamejs-test-nats

jetstream {
  store_dir: "/data/jetstream"
}

tls {
  cert_file:  "/certs/nats.crt"
  key_file:   "/certs/nats.key"
  ca_file:    "/certs/ca.crt"
  verify:     false
  # NATS uses Go's TLS stack defaults for curve negotiation. Go 1.24+
  # automatically offers X25519MLKEM768 hybrid in TLS 1.3 handshakes
  # without explicit configuration; older Go falls back to X25519/P256.
  # Explicit curve_preferences here would lock us out of hybrid PQC
  # whenever the runtime supports it, so we leave them at default.
}

# Note: "tls" block above applies to the main port. NATS doesn't expose
# a separate "tls_port" — clients negotiate TLS on the main port via
# the INFO/CONNECT handshake. The integration tests therefore use the
# same 4222 endpoint with tls=true vs tls=false on the client side.
