# Minimal Postgres config. Listens on 5432, accepts BOTH plain and TLS
# connections; client picks via sslmode=require/disable/prefer.
# Cert paths point at the post-init location populated by init-tls.sh
# (where the keys are chowned to the postgres user with 0600 perms —
# postgres refuses to start with looser perms).

listen_addresses = '*'

ssl = on
ssl_cert_file = '/var/lib/postgresql/certs/server.crt'
ssl_key_file  = '/var/lib/postgresql/certs/server.key'
ssl_ca_file   = '/var/lib/postgresql/certs/root.crt'

# Modern TLS only. ssl_ciphers controls TLS 1.2 cipher list; TLS 1.3
# cipher suites (which is what we actually negotiate at min_protocol=1.3)
# are picked from OpenSSL defaults. Setting ssl_ciphers to TLS 1.3 names
# trips a startup validation error in postgres 18, so leave at default.
ssl_min_protocol_version = 'TLSv1.3'
