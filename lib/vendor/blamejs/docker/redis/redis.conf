# Redis config for blamejs integration testing.
# Listens on BOTH plain (6379) and TLS (6380) ports.
# No persistence (tests start clean), no auth (test-only, bound to 127.0.0.1).

port 6379
tls-port 6380
tls-cert-file /certs/redis.crt
tls-key-file  /certs/redis.key
tls-ca-cert-file /certs/ca.crt
tls-auth-clients no

save ""
appendonly no
protected-mode no
loglevel notice
